<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lozada Family Ultimate</title>

<!-- FIREBASE COMPAT (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}
header {background:linear-gradient(to right, red, purple); color:white; padding:15px;}

.layer {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}

.card {
  background:white; margin:10px; padding:10px; width:150px;
  border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.2);
  border:3px solid purple; cursor:pointer;
}

img {width:100%; height:120px; object-fit:cover; border-radius:8px; background:#ddd;}
h4 {font-size:13px; border:2px solid red; padding:5px; border-radius:6px;}

input {width:90%; padding:6px; margin:5px;}
button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

.box {background:white; margin:20px auto; padding:15px; width:90%; max-width:400px; border-radius:10px;}
.comment {background:#fff; padding:10px; margin:5px; border-radius:8px; text-align:left;}

.dark {background:#111; color:white;}
.dark .box,.dark .card {background:#222;}

#profileBox {display:none;}
</style>
</head>

<body>

<header>
👨‍👩‍👧‍👦 Lozada Family Ultimate<br>
<button onclick="logout()">Logout</button>
<button onclick="toggleDark()">🌙</button>
</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>🔐 Login</h3>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- PROFILE -->
  <div class="box" id="profileBox">
    <h3 id="profileName"></h3>
    <input id="birthday" placeholder="Birthday"><br>
    <input id="address" placeholder="Address"><br>
    <input id="contact" placeholder="Contact"><br>
    <input id="email" placeholder="Email"><br>

    <button onclick="saveProfile()">SAVE / UPDATE</button>
    <button onclick="closeProfile()">Close</button>
  </div>

  <!-- COMMENTS -->
  <div class="box">
    <h3>💬 Family Wall</h3>
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>
</div>

<script>

/* FIREBASE INIT */
const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LOGIN */
let currentUser = "";

if(localStorage.getItem("user")){
  currentUser = localStorage.getItem("user");
  loginBox.style.display="none";
  app.style.display="block";
}

function login(){
  if(pass.value === "123"){
    currentUser = user.value;
    localStorage.setItem("user",currentUser);
    loginBox.style.display="none";
    app.style.display="block";
  } else alert("Wrong password");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* FAMILY */
const layers = {
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

Object.keys(layers).forEach(layerKey=>{
  const container=document.getElementById(layerKey);

  layers[layerKey].forEach((name,i)=>{
    const id=layerKey+"_"+i;

    container.innerHTML+=`
    <div class="card" onclick="openProfile('${name}','${id}')">
      <img id="${id}">
      <h4>${name}</h4>
      <input type="file" onclick="event.stopPropagation()" onchange="uploadImage(event,'${id}')">
    </div>
    `;

    loadImage(id);
  });
});

/* LOAD IMAGE */
function loadImage(id){
  db.collection("familyTree").doc(id).get().then(doc=>{
    if(doc.exists){
      document.getElementById(id).src = doc.data().image;
    }
  });
}

/* UPLOAD */
function uploadImage(e,id){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=function(){
    db.collection("familyTree").doc(id).set({
      image:reader.result
    });
    document.getElementById(id).src = reader.result;
  };

  reader.readAsDataURL(file);
}

/* PROFILE */
let currentProfile="";

function openProfile(name,id){
  currentProfile=id;
  profileBox.style.display="block";
  profileName.innerText=name;

  db.collection("profiles").doc(id).get().then(doc=>{
    if(doc.exists){
      let d=doc.data();
      birthday.value=d.birthday||"";
      address.value=d.address||"";
      contact.value=d.contact||"";
      email.value=d.email||"";
    }
  });
}

function saveProfile(){
  db.collection("profiles").doc(currentProfile).set({
    birthday:birthday.value,
    address:address.value,
    contact:contact.value,
    email:email.value
  });
  alert("Saved!");
}

function closeProfile(){
  profileBox.style.display="none";
}

/* COMMENTS */
function addComment(){
  if(!comment.value) return;

  db.collection("comments").add({
    name:currentUser,
    text:comment.value,
    time:Date.now(),
    likes:0
  });

  comment.value="";
}

/* REALTIME */
db.collection("comments").orderBy("time").onSnapshot(snap=>{
  comments.innerHTML="";
  snap.forEach(doc=>{
    let c=doc.data();

    comments.innerHTML+=`
    <div class="comment">
      <b>${c.name}</b><br>
      ${c.text}<br>
      ❤️ ${c.likes||0}<br>
      <button onclick="like('${doc.id}',${c.likes||0})">Like</button>
      <button onclick="edit('${doc.id}','${c.text}')">Edit</button>
      <button onclick="del('${doc.id}')">Delete</button>
    </div>
    `;
  });
});

/* LIKE */
function like(id,likes){
  db.collection("comments").doc(id).update({
    likes:likes+1
  });
}

/* DELETE */
function del(id){
  db.collection("comments").doc(id).delete();
}

/* EDIT */
function edit(id,text){
  let t=prompt("Edit:",text);
  if(t){
    db.collection("comments").doc(id).update({
      text:t
    });
  }
}

</script>

</body>
</html>
