<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {
      font-family: Arial;
      background:#111;
      margin:0;
      text-align:center;
      color:white;
    }

    /* 🔥 BIG HEADER */
    header {
      background:linear-gradient(to right, red, purple);
      padding:25px;
      font-size:28px;
      font-weight:bold;
      letter-spacing:2px;
    }

    /* QUOTE */
    .quote {
      font-size:14px;
      font-style:italic;
      margin-top:8px;
      opacity:0.8;
    }

    #loginBox {
      margin:80px auto 10px;
      width:90%;
      max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    input {
      width:90%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 15px;
      background:purple;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
    }

    #credit {font-size:12px; opacity:0.7;}

    /* FAMILY BG */
    .family-section {
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      padding:20px;
      position:relative;
    }

    .family-section::before {
      content:"";
      position:absolute;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      top:0; left:0;
    }

    .family-section > * {position:relative; z-index:1;}

    .layer {
      display:grid;
      grid-template-columns:repeat(4,150px);
      justify-content:center;
      gap:20px;
      margin:20px auto;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:12px;
      border:2px solid purple;
      width:150px;
    }

    img {
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:8px;
      cursor:pointer;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      cursor:pointer;
    }

    .title {
      border:2px solid red;
      display:inline-block;
      padding:6px 15px;
      border-radius:8px;
      margin-top:20px;
    }

    .pamangkin-section {
      background:repeating-linear-gradient(45deg,#1a1a1a,#1a1a1a 10px,#222 10px,#222 20px);
      padding:20px;
    }

    .gallery-section {
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      padding:20px;
    }

    #profileBox, #zoomBox {
      display:none;
      position:fixed;
      z-index:2000;
    }

    #profileBox {
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white; color:black;
      padding:20px; border-radius:12px;
    }

    #zoomBox {
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.95);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    #zoomBox img {
      width:90%;
      max-width:900px;
      max-height:80vh;
    }

  </style>
</head>

<body>

<header>
  🏡 LOZADA FAMILY ULTIMATE
  <div class="quote">"Family is not an important thing. It's everything."</div>
</header>

<div id="loginBox">
  <h2>HI WELCOME</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="credit">CREATED BY: JEMMEL LOZADA</div>

<div id="app" style="display:none;">

  <div class="family-section">
    <h2 class="title">FAMILY</h2>
    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>
    <div class="layer" id="layer3"></div>
  </div>

  <div class="pamangkin-section">
    <h2 class="title">PAMANGKIN</h2>
    <div class="layer" id="pamangkin1"></div>
    <div class="layer" id="pamangkin2"></div>
  </div>

  <div class="gallery-section">
    <h2 class="title">GALLERY</h2>
    <div class="layer" id="gallery1"></div>
    <div class="layer" id="gallery2"></div>
    <div class="layer" id="gallery3"></div>
    <div class="layer" id="gallery4"></div>
    <div class="layer" id="gallery5"></div>
  </div>

  <div id="profileBox">
    <h3 id="profileName"></h3>
    <input id="birthday"><br>
    <input id="address"><br>
    <input id="contact"><br>
    <input id="email"><br>
    <button onclick="saveProfile()">Save</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <div id="zoomBox">
    <img id="zoomImg">
    <div>
      <button onclick="deletePhoto()">Delete</button>
      <button onclick="closeAll()">Close</button>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentZoom="", currentProfile="";
let isAdmin=false;

window.login=()=>{
  if(user.value==="admin" && pass.value==="123"){
    isAdmin=true;
  }

  if(pass.value==="123"){
    loginBox.style.display="none";
    credit.style.display="none";
    app.style.display="block";
  }
};

const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye"],
  pamangkin2:["Sherwin","Ashley","Union","Jazmine"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","",""]; }

function create(data,type=""){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      let click="";
      if(type!=="gallery"){
        click=`onclick="openProfile('${id}','${name}')"`
      }

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4 ${click}>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery,"gallery");

window.upload=(e,id)=>{
  if(!isAdmin) return alert("Admin only");

  const r=new FileReader();
  r.onload=()=>setDoc(doc(db,"familyTree",id),{image:r.result});
  r.readAsDataURL(e.target.files[0]);
};

window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="flex";
};

window.deletePhoto=async()=>{
  if(!isAdmin) return alert("Admin only");

  await deleteDoc(doc(db,"familyTree",currentZoom));
  document.getElementById(currentZoom).src="";
  zoomBox.style.display="none";
};

window.openProfile=async(id,name)=>{
  currentProfile=id;
  profileName.innerText=name;
  profileBox.style.display="block";

  const snap = await getDoc(doc(db,"profiles",id));
  if(snap.exists()){
    const d=snap.data();
    birthday.value=d.birthday||"";
    address.value=d.address||"";
    contact.value=d.contact||"";
    email.value=d.email||"";
  }
};

window.saveProfile=()=>{
  if(!isAdmin) return alert("Admin only");

  setDoc(doc(db,"profiles",currentProfile),{
    birthday:birthday.value,
    address:address.value,
    contact:contact.value,
    email:email.value
  });
};

window.closeAll=()=>{
  zoomBox.style.display="none";
  profileBox.style.display="none";
};

</script>

</body>
</html>
