<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}
    header {background:linear-gradient(to right, red, purple); color:white; padding:15px; font-size:22px;}

    .layer {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}

    .card {
      background:white; margin:10px; padding:10px; width:150px;
      border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple; cursor:pointer;
    }

    img {width:100%; height:120px; object-fit:cover; border-radius:8px; background:#ddd;}

    h4 {font-size:13px; border:2px solid red; padding:5px; border-radius:6px;}

    .title {border:3px solid red; display:inline-block; padding:5px 15px; border-radius:8px; background:white;}

    input {width:90%; padding:6px; margin:5px;}
    button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

    .box {background:white; margin:20px auto; padding:15px; width:90%; max-width:400px; border-radius:10px;}
    .comment {background:#fff; padding:10px; margin:5px; border-radius:8px; text-align:left;}

    #profileBox, #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      z-index:1000;
    }

    #overlay {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    #zoomBox img {
      width:250px;
      height:auto;
    }

    .slideshow {
      width:90%;
      max-width:300px;
      margin:20px auto;
    }

    .slideshow img {
      width:100%;
      border-radius:10px;
    }

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<div id="loginBox" class="box">
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <!-- FAMILY -->
  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- PAMANGKIN -->
  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <!-- 🔥 AUTO SLIDESHOW -->
  <h2 class="title">GALLERY SLIDESHOW</h2>
  <div class="slideshow">
    <img id="slideImg">
  </div>

  <!-- GALLERY -->
  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>
  <div class="layer" id="gallery6"></div>
  <div class="layer" id="gallery7"></div>
  <div class="layer" id="gallery8"></div>
  <div class="layer" id="gallery9"></div>
  <div class="layer" id="gallery10"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <!-- PROFILE -->
  <div id="profileBox">
    <h3 id="profileName"></h3>
    <input id="birthday"><br>
    <input id="address"><br>
    <input id="contact"><br>
    <input id="email"><br>
    <button onclick="saveProfile()">Save</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <!-- 🔥 ZOOM -->
  <div id="zoomBox">
    <img id="zoomImg"><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <!-- COMMENTS -->
  <div class="box">
    <input id="comment">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentProfile="", currentZoom="";

// LOGIN
if(localStorage.getItem("user")){
  loginBox.style.display="none"; app.style.display="block";
}
window.login=()=>{
  if(pass.value==="123"){
    currentUser=user.value;
    localStorage.setItem("user",user.value);
    loginBox.style.display="none"; app.style.display="block";
  }
};

// DATA
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin","Bjoy"],
  pamangkin2:["Ashley","Union","Jazmine","Apple"]
};

const gallery={};
for(let i=1;i<=10;i++){ gallery["gallery"+i]=["","","","","",""]; }

// CREATE
let slideImages=[];

function create(data){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          const img=snap.data().image;
          document.getElementById(id).src=img;

          if(!slideImages.includes(img)){
            slideImages.push(img);
          }
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

// UPLOAD
window.upload=(e,id)=>{
  const r=new FileReader();
  r.onload=()=>setDoc(doc(db,"familyTree",id),{image:r.result});
  r.readAsDataURL(e.target.files[0]);
};

// ZOOM
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

// DELETE
window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
  zoomImg.src="";
};

// CLOSE
window.closeAll=()=>{
  profileBox.style.display="none";
  zoomBox.style.display="none";
  overlay.style.display="none";
};

// SLIDESHOW
let index=0;
setInterval(()=>{
  if(slideImages.length>0){
    slideImg.src=slideImages[index % slideImages.length];
    index++;
  }
},2000);

// COMMENTS
window.addComment=()=>{
  if(!comment.value) return;
  addDoc(collection(db,"comments"),{
    name:currentUser,
    text:comment.value,
    time:Date.now()
  });
  comment.value="";
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    comments.innerHTML+=`<div class="comment"><b>${c.name}</b><br>${c.text}</div>`;
  });
});

</script>

</body>
</html>
