<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}

    header {
      background:linear-gradient(to right, red, purple);
      color:white;
      padding:20px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .header-title {font-size:28px; font-weight:bold; letter-spacing:2px;}
    .header-quote {font-size:14px; margin-top:5px; font-style:italic;}

    .layer {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}

    .card {
      background:white;
      margin:10px;
      padding:10px;
      width: clamp(140px, 22vw, 180px);
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
      cursor:pointer;
    }

    img {
      width:100%;
      height: clamp(110px, 18vw, 150px);
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
    }

    h4 {
      font-size:13px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
    }

    .title {
      border:3px solid red;
      display:inline-block;
      padding:5px 15px;
      border-radius:8px;
      background:white;
    }

    input {width:90%; padding:6px; margin:5px;}
    button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

    .box {
      background:white;
      margin:20px auto;
      padding:15px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    .comment {
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    .login-box {
      background:url('https://images.unsplash.com/photo-1614064641938-3bbee52942c7') center/cover no-repeat;
      border:4px solid purple;
      border-radius:15px;
      padding:20px;
      width:90%;
      max-width:350px;
      margin:50px auto;
      color:white;
      box-shadow:0 0 20px rgba(128,0,128,0.6);
    }

    .login-box input {
      width:90%;
      padding:8px;
      margin:6px;
      border-radius:6px;
      border:none;
    }

    .login-box button {
      background:red;
      font-weight:bold;
    }

    .creator {
      margin-top:10px;
      font-size:12px;
    }

    #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:25px;
      border-radius:12px;
      z-index:1000;
    }

    #zoomBox img {
      width:50vw;
      max-width:500px;
      height:auto;
      border-radius:12px;;
    }

    #overlay {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    .family-bg {
      background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      padding:20px 0;
      border-radius:12px;
      margin:10px;
    }
  </style>
</head>

<body>

<header id="header">
  <div class="header-title">👨‍👩‍👧‍👦 LOZADA FAMILY ULTIMATE</div>
  <div class="header-quote">"Family is not an important thing, it's everything."</div>
</header>

<div id="loginBox" class="login-box">
  <h2>🔐 LOGIN</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">LOGIN</button>
  <p class="creator">Created by JHIM LOZADA</p>
</div>

<div id="app" style="display:none;">
  <div class="family-bg">
    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>
    <div class="layer" id="layer3"></div>
  </div>

  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <div id="zoomBox">
    <img id="zoomImg"><br><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <div class="box">
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentRole="USER", currentZoom="";

/* MULTI USER */
const users = {
  "admin": {pass:"1234", role:"ADMIN"},
  "jena": {pass:"1111", role:"USER"},
  "jimmy": {pass:"2222", role:"USER"}
};

window.login = function(){
  const u = user.value.trim();
  const p = pass.value.trim();

  if(users[u] && users[u].pass === p){
    currentUser = u;
    currentRole = users[u].role;

    loginBox.style.display="none";
    app.style.display="block";

    showUserUI();
  } else {
    alert("Invalid login ❌");
  }
};

function showUserUI(){
  const userLabel = document.createElement("div");
  userLabel.innerText = "👤 " + currentUser;
  userLabel.style="font-size:12px;margin-top:5px;";
  header.appendChild(userLabel);

  const logoutBtn = document.createElement("button");
  logoutBtn.innerText="Logout";
  logoutBtn.onclick=()=>location.reload();
  logoutBtn.style="margin-top:5px;";
  header.appendChild(logoutBtn);
}

/* DATA */
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin"],
  pamangkin2:["Ashley","Union","Jazmine","Apple","Bjoy"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","","",""]; }

/* CREATE */
function create(data){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

/* UPLOAD */
window.upload = (e,id)=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    setDoc(doc(db,"familyTree",id),{
      image:reader.result,
      uploadedBy: currentUser
    });
  };
  reader.readAsDataURL(file);
};

/* DELETE */
window.deletePhoto = async () => {
  if(currentRole !== "ADMIN"){
    alert("Admin only ❌");
    return;
  }

  if(!currentZoom) return;
  if(!confirm("Delete this photo?")) return;

  await deleteDoc(doc(db,"familyTree",currentZoom));
  document.getElementById(currentZoom).src="";
  zoomBox.style.display="none";
  overlay.style.display="none";
};

/* ZOOM */
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

window.closeAll=()=>{
  zoomBox.style.display="none";
  overlay.style.display="none";
};

/* COMMENTS */
window.addComment=()=>{
  if(!comment.value) return;

  addDoc(collection(db,"comments"),{
    name:currentUser,
    text:comment.value,
    time:Date.now(),
    likes:0
  });

  comment.value="";
};

window.likeComment = async (id, likes=0)=>{
  await setDoc(doc(db,"comments",id),{likes:likes+1},{merge:true});
};

window.deleteComment = async (id)=>{
  if(currentRole!=="ADMIN") return alert("Admin only ❌");
  if(confirm("Delete?")) await deleteDoc(doc(db,"comments",id));
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data(), id=d.id;
    comments.innerHTML+=`
    <div class="comment">
      <b>${c.name}</b><br>${c.text}<br><br>
      👍 ${c.likes||0}
      <button onclick="likeComment('${id}',${c.likes||0})">Like</button>
      ${currentRole==="ADMIN"?`<button onclick="deleteComment('${id}')">Delete</button>`:""}
    </div>`;
  });

  comments.scrollTop = comments.scrollHeight;
});

/* 🔥 FULL FIX: PERSONAL INFO POPUP */

const infoBox=document.createElement("div");
infoBox.style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:12px;z-index:1001;width:90%;max-width:350px;";
infoBox.innerHTML=`
<h3>Personal Info</h3>
<input id="info_name" placeholder="Full Name"><br>
<input id="info_address" placeholder="Address"><br>
<input id="info_contact" placeholder="Contact Number"><br>
<input id="info_email" placeholder="Email"><br>
<input id="info_bday" type="date"><br><br>
<button onclick="saveInfo()">Save</button>
<button onclick="closeInfo()">Close</button>
`;
document.body.appendChild(infoBox);

let currentPerson="";

setTimeout(()=>{
  document.querySelectorAll(".card h4").forEach(el=>{
    el.onclick=()=>openInfo(el.innerText);
  });
},1500);

window.openInfo=(name)=>{
  currentPerson=name;
  infoBox.style.display="block";
  overlay.style.display="block";

  onSnapshot(doc(db,"personInfo",name),(snap)=>{
    if(snap.exists()){
      let d=snap.data();
      info_name.value=d.name||"";
      info_address.value=d.address||"";
      info_contact.value=d.contact||"";
      info_email.value=d.email||"";
      info_bday.value=d.bday||"";
    }else{
      info_name.value=name;
      info_address.value="";
      info_contact.value="";
      info_email.value="";
      info_bday.value="";
    }
  });
};

window.saveInfo=async ()=>{
  await setDoc(doc(db,"personInfo",currentPerson),{
    name:info_name.value,
    address:info_address.value,
    contact:info_contact.value,
    email:info_email.value,
    bday:info_bday.value
  });
  alert("Saved ✅");
};

window.closeInfo=()=>{
  infoBox.style.display="none";
  overlay.style.display="none";
};
  /* ===============================
🔥 LEVEL 6 ADD-ONS (SAFE ADD ONLY)
=============================== */

/* ===============================
💬 1. GLOBAL CHAT (UPGRADE)
=============================== */

const notifBell = document.createElement("div");
notifBell.innerHTML = "🔔<span id='notifCount' style='color:red;font-weight:bold;'>0</span>";
notifBell.style = "position:fixed;top:15px;right:20px;font-size:22px;cursor:pointer;z-index:1002;";
document.body.appendChild(notifBell);

let notif = 0;

/* ===============================
💬 MESSAGE BUTTON (ENHANCED)
=============================== */

const msgBtn = document.createElement("button");
msgBtn.innerText = "💬";
msgBtn.style = "position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;z-index:1002;background:purple;color:white;";
document.body.appendChild(msgBtn);

const msgBox = document.createElement("div");
msgBox.style = "display:none;position:fixed;bottom:90px;right:20px;width:300px;background:white;border-radius:12px;padding:10px;z-index:1002;";
msgBox.innerHTML = `
<div style="display:flex;justify-content:space-between;">
<b>Family Chat</b>
<button onclick="msgBox.style.display='none'">❌</button>
</div>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput" placeholder="Message">
<button onclick="sendMsg()">Send</button>
`;
document.body.appendChild(msgBox);

msgBtn.onclick=()=>msgBox.style.display="block";

/* SEND MESSAGE */
window.sendMsg=()=>{
  if(!chatInput.value) return;
  addDoc(collection(db,"chat"),{
    name:currentUser,
    text:chatInput.value,
    time:Date.now()
  });
  chatInput.value="";
};

/* REALTIME CHAT + NOTIF */
onSnapshot(query(collection(db,"chat"),orderBy("time")),(snap)=>{
  chatMessages.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    chatMessages.innerHTML+=`<div><b>${c.name}</b>: ${c.text}</div>`;
  });

  notif++;
  notifCount.innerText = notif;
});

/* ===============================
🔔 2. NOTIFICATION CLICK RESET
=============================== */

notifBell.onclick=()=>{
  notif=0;
  notifCount.innerText=0;
  msgBox.style.display="block";
};

/* ===============================
👤 3. USER PROFILE SYSTEM
=============================== */

const profileBox=document.createElement("div");
profileBox.style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:12px;z-index:1002;";
profileBox.innerHTML=`
<h3>My Profile</h3>
<input id="p_name" placeholder="Name"><br>
<input id="p_bio" placeholder="Bio"><br>
<input type="file" id="p_img"><br><br>
<button onclick="saveProfile()">Save</button>
<button onclick="profileBox.style.display='none'">Close</button>
`;
document.body.appendChild(profileBox);

/* OPEN PROFILE BUTTON */
const profileBtn=document.createElement("button");
profileBtn.innerText="👤";
profileBtn.style="position:fixed;top:15px;right:70px;z-index:1002;";
document.body.appendChild(profileBtn);

profileBtn.onclick=()=>{
  profileBox.style.display="block";

  onSnapshot(doc(db,"profiles",currentUser),(snap)=>{
    if(snap.exists()){
      let d=snap.data();
      p_name.value=d.name||"";
      p_bio.value=d.bio||"";
    }
  });
};

/* SAVE PROFILE */
window.saveProfile=()=>{
  const file=p_img.files[0];

  if(file){
    const reader=new FileReader();
    reader.onload=()=>{
      setDoc(doc(db,"profiles",currentUser),{
        name:p_name.value,
        bio:p_bio.value,
        img:reader.result
      });
    };
    reader.readAsDataURL(file);
  }else{
    setDoc(doc(db,"profiles",currentUser),{
      name:p_name.value,
      bio:p_bio.value
    });
  }

  alert("Profile saved ✅");
};

/* ===============================
💌 4. PRIVATE CHAT
=============================== */

window.sendPrivate=(toUser)=>{
  const msg=prompt("Message to "+toUser);
  if(!msg) return;

  addDoc(collection(db,"privateChat"),{
    from:currentUser,
    to:toUser,
    text:msg,
    time:Date.now()
  });
};

/* CLICK NAME TO MESSAGE */
setTimeout(()=>{
  document.querySelectorAll(".card h4").forEach(el=>{
    el.ondblclick=()=>sendPrivate(el.innerText);
  });
},2000);

/* ===============================
📷 5. MULTIPLE UPLOAD SUPPORT
=============================== */

window.multiUpload=(e,id)=>{
  const files=e.target.files;

  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=()=>{
      addDoc(collection(db,"galleryMulti"),{
        image:reader.result,
        uploadedBy:currentUser,
        time:Date.now()
      });
    };
    reader.readAsDataURL(file);
  });
};

/* AUTO ADD MULTI INPUT SA GALLERY */
setTimeout(()=>{
  document.querySelectorAll("#gallery1 .card, #gallery2 .card, #gallery3 .card").forEach(card=>{
    const input=document.createElement("input");
    input.type="file";
    input.multiple=true;
    input.onchange=(e)=>multiUpload(e,"multi");
    card.appendChild(input);
  });
},2000);

/* SHOW MULTI IMAGES */
onSnapshot(query(collection(db,"galleryMulti"),orderBy("time")),(snap)=>{
  snap.forEach(d=>{
    let img=document.createElement("img");
    img.src=d.data().image;
    img.style="width:80px;margin:5px;border-radius:8px;";
    gallery5.appendChild(img);
  });
});
/* 🔥 ADD X CLOSE BUTTON SA CHAT (SAFE ADD ONLY) */

setTimeout(()=>{
  const header = msgBox.querySelector("div");

  const closeBtn = document.createElement("button");
  closeBtn.innerText = "❌";
  closeBtn.style = "background:red;margin-left:10px;";

  closeBtn.onclick = () => {
    msgBox.style.display = "none";
  };

  header.appendChild(closeBtn);
}, 1000);
  /* ===============================
🔥 LEVEL 7 ADD-ONS (ONLINE + SEEN)
=============================== */

/* ===============================
🟢 1. ONLINE USERS SYSTEM
=============================== */

// set user online
setDoc(doc(db,"status",currentUser),{
  online:true,
  lastActive:Date.now()
});

// auto offline when close
window.addEventListener("beforeunload",()=>{
  setDoc(doc(db,"status",currentUser),{
    online:false,
    lastActive:Date.now()
  });
});

// show online users UI
const onlineBox=document.createElement("div");
onlineBox.style="position:fixed;left:10px;bottom:20px;background:white;padding:10px;border-radius:10px;z-index:1002;width:150px;max-height:200px;overflow:auto;";
onlineBox.innerHTML="<b>🟢 Online</b><div id='onlineList'></div>";
document.body.appendChild(onlineBox);

// realtime users
onSnapshot(collection(db,"status"),(snap)=>{
  onlineList.innerHTML="";
  snap.forEach(d=>{
    let u=d.id;
    let data=d.data();
    if(data.online){
      onlineList.innerHTML+=`<div>🟢 ${u}</div>`;
    }
  });
});


/* ===============================
✔✔ 2. SEEN / DELIVERED SYSTEM
=============================== */

// send message with status
window.sendMsg=()=>{
  if(!chatInput.value) return;

  addDoc(collection(db,"chat"),{
    name:currentUser,
    text:chatInput.value,
    time:Date.now(),
    seen:false
  });

  chatInput.value="";
};

// mark messages as seen
onSnapshot(query(collection(db,"chat"),orderBy("time")),(snap)=>{
  chatMessages.innerHTML="";

  snap.forEach(docSnap=>{
    let c=docSnap.data();
    let id=docSnap.id;

    // auto seen if not sender
    if(c.name!==currentUser && !c.seen){
      setDoc(doc(db,"chat",id),{seen:true},{merge:true});
    }

    let status = "";
    if(c.name===currentUser){
      status = c.seen ? "✔✔ Seen" : "✔ Sent";
    }

    chatMessages.innerHTML+=`
      <div style="margin:5px 0;">
        <b>${c.name}</b>: ${c.text}<br>
        <small>${status}</small>
      </div>
    `;
  });

  chatMessages.scrollTop = chatMessages.scrollHeight;
});
  /* 🔥 FIX PROFILE CLOSE BUTTON */

window.closeProfile = () => {
  profileBox.style.display = "none";
};
  setTimeout(()=>{
  const btns = profileBox.querySelectorAll("button");

  btns.forEach(btn=>{
    if(btn.innerText.includes("Close")){
      btn.onclick = window.closeProfile;
    }
  });
},1000);
  /* 🔥 FORCE FIX PROFILE CLOSE BUTTON */

setTimeout(()=>{
  const closeBtn = profileBox.querySelector("button:last-child");

  if(closeBtn){
    closeBtn.onclick = () => {
      profileBox.style.display = "none";
      overlay.style.display = "none";
    };
  }
},1500);
  /* 🔥 FINAL FIX PROFILE CLOSE (NO FAIL) */

setTimeout(()=>{
  const closeBtn = profileBox.querySelector("button:last-of-type");

  if(closeBtn){
    closeBtn.addEventListener("click", (e)=>{
      e.preventDefault();

      profileBox.style.display = "none";
      overlay.style.display = "none";
    });
  }
},2000);
  /* STEP 1 */
window.openProfileFixed = () => {
  profileBox.style.display = "block";
  overlay.style.display = "block";
};

window.closeProfileFixed = () => {
  profileBox.style.display = "none";
  overlay.style.display = "none";
};

/* STEP 2 */
setTimeout(()=>{
  const buttons = profileBox.querySelectorAll("button");
  if(buttons.length >= 2){
    buttons[1].onclick = window.closeProfileFixed;
  }
},2000);

/* STEP 3 */
profileBtn.onclick = window.openProfileFixed;
</script>

</body>
</html>
