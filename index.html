<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      width: 160px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }

    input {
      font-size: 10px;
      margin-top: 5px;
    }

    h3 {
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  👨‍👩‍👧‍👦 Lozada Family
</header>

<div class="container" id="family"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8",
  storageBucket: "family-web-10cb8.appspot.com",
  messagingSenderId: "152048365178",
  appId: "1:152048365178:web:bd24e27f676b02b7d915c3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👨‍👩‍👧‍👦 FAMILY MEMBERS
const members = [
  "DELIA LOZADA",
  "JIMMY LOZADA",
  "CHERRY GRACE LOZADA",
  "CHEVY LOZADA CORTEZ",
  "JERBOY LOZADA",
  "JENADEL LOZADA",
  "JEMMEL LOZADA",
  "JIMDEL LOZADA",
  "JISA LOZADA"
];

const container = document.getElementById("family");

// CREATE UI
members.forEach((name, index) => {
  const id = "img" + index;

  container.innerHTML += `
    <div class="card">
      <img id="${id}">
      <h3>${name}</h3>
      <input type="file" onchange="uploadImage(event, '${id}')">
    </div>
  `;
});

// LOAD IMAGES
members.forEach(async (name, index) => {
  const id = "img" + index;

  const docRef = doc(db, "familyImages", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    document.getElementById(id).src = docSnap.data().image;
  }
});

// UPLOAD IMAGE
window.uploadImage = function(event, id) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {
    const base64 = reader.result;

    await setDoc(doc(db, "familyImages", id), {
      image: base64
    });

    document.getElementById(id).src = base64;

    alert("✅ Uploaded!");
  };

  reader.readAsDataURL(file);
};

</script>

</body>
</html>
