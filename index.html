<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .layer {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      width: 150px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border: 3px solid purple;
      cursor: pointer;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }

    h4 {
      font-size: 13px;
      border: 2px solid red;
      padding: 5px;
      border-radius: 6px;
      background: #fff0f5;
    }

    .box {
      background: white;
      margin: 20px auto;
      padding: 15px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 6px;
      margin: 5px;
    }

    button {
      padding: 6px 10px;
      background: purple;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 5px;
    }

    .comment {
      background: #fff;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      text-align: left;
    }

    #profileBox {
      display: none;
    }

  </style>
</head>

<body>

<header>
  👨‍👩‍👧‍👦 Lozada Family Pro
</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>🔐 Login</h3>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="app" style="display:none;">
