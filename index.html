<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Tree</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      text-align: center;
      margin: 0;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .layer {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
      width: 150px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border: 3px solid purple;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
      border: 2px solid #ccc;
    }

    h4 {
      margin: 8px 0 5px;
      font-size: 13px;
      padding: 5px;
      border: 2px solid red;
      border-radius: 6px;
      background: #fff0f5;
    }

    .role {
      font-size: 10px;
      color: gray;
      margin-bottom: 5px;
    }

    input {
      font-size: 10px;
    }

    /* LAYER COLORS */
    #layer1 .card { border-color: gold; }
    #layer2 .card { border-color: blue; }
    #layer3 .card { border-color: green; }
    #layer4 .card { border-color: purple; }

  </style>
</head>

<body>

<header>
  👨‍👩‍👧‍👦 Lozada Family Tree
</header>

<div class="layer" id="layer1"></div>
<div class="layer" id="layer2"></div>
<div class="layer" id="layer3"></div>
<div class="layer" id="layer4"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8",
  storageBucket: "family-web-10cb8.appspot.com",
  messagingSenderId: "152048365178",
  appId: "1:152048365178:web:bd24e27f676b02b7d915c3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const layers = {
  layer1: [
    {name:"DELIA LOZADA", role:"Mother"},
    {name:"JIMMY LOZADA", role:"Father"}
  ],
  layer2: [
    {name:"CHERRY GRACE LOZADA", role:"Sibling"},
    {name:"CHEVY LOZADA CORTEZ", role:"Sibling"}
  ],
  layer3: [
    {name:"JERBOY LOZADA", role:"Sibling"},
    {name:"JENADEL LOZADA", role:"Sibling"}
  ],
  layer4: [
    {name:"JEMMEL LOZADA", role:"Sibling"},
    {name:"JIMDEL LOZADA", role:"Sibling"},
    {name:"JISA LOZADA", role:"Sibling"}
  ]
};

Object.keys(layers).forEach((layerKey) => {
  const container = document.getElementById(layerKey);

  layers[layerKey].forEach((m, i) => {
    const id = layerKey + "_" + i;

    container.innerHTML += `
      <div class="card">
        <img id="${id}">
        <h4>${m.name}</h4>
        <div class="role">${m.role}</div>
        <input type="file" onchange="uploadImage(event,'${id}')">
      </div>
    `;

    loadImage(id);
  });
});

async function loadImage(id){
  const docRef = doc(db,"familyTree",id);
  const snap = await getDoc(docRef);

  if(snap.exists()){
    document.getElementById(id).src = snap.data().image;
  }
}

window.uploadImage = function(e,id){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function(){
    const base64 = reader.result;

    await setDoc(doc(db,"familyTree",id),{
      image: base64
    });

    document.getElementById(id).src = base64;
  };

  reader.readAsDataURL(file);
};

</script>

</body>
</html>
