<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lozada Family Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {font-family: Arial; margin:0; text-align:center; background:#f0f0f0;}
header {background:linear-gradient(to right, red, purple); color:white; padding:15px;}

.layer {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin:20px;
  gap:10px;
}

.card {
  background:white;
  margin:10px;
  padding:10px;
  width:140px;
  min-width:140px; /* 🔥 FIX */
  border-radius:12px;
  border:3px solid purple;
  cursor:pointer;
}

img {width:100%; height:110px; border-radius:8px; background:#ddd;}

.box {
  background:white;
  margin:20px auto;
  padding:15px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

.comment {
  background:#fff;
  padding:10px;
  margin:5px;
  border-radius:8px;
  text-align:left;
}

/* FLOATING */
#profileBox {
display:none;
position:fixed;
top:0; left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.modal {
background:linear-gradient(135deg,#fff,#f3e5f5);
margin:10% auto;
padding:20px;
width:90%;
max-width:400px;
border-radius:15px;
border:4px solid purple;
box-shadow:0 0 20px rgba(128,0,128,0.5);
}

/* DARK MODE */
.dark {background:#111; color:white;}
.dark .card,.dark .box,.dark .modal {background:#222;}

/* 📱 MOBILE FIX */
@media (max-width:600px){

.layer {
  flex-wrap:nowrap;
  overflow-x:auto;
}

.card {
  flex-shrink:0;
}

.modal {
  width:95%;
  margin:20% auto;
}

.box {
  width:95%;
}

}
</style>
</head>

<body>

<header>
👨‍👩‍👧‍👦 Lozada Family Ultimate<br>
<button onclick="logout()">Logout</button>
<button onclick="toggleDark()">🌙</button>
</header>

<div id="loginBox">
<h3>Login</h3>
<input id="user"><br>
<input id="pass" type="password"><br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="layer" id="layer1"></div>
<div class="layer" id="layer2"></div>
<div class="layer" id="layer3"></div>

<div class="box">
<input id="comment" placeholder="Write comment">
<button onclick="addComment()">Post</button>
<div id="comments"></div>
</div>

</div>

<div id="profileBox">
<div class="modal">

<h3 id="profileName" style="color:purple;"></h3>

<input type="file" onchange="uploadPhoto(event)">
<input id="birthday" placeholder="Birthday">
<input id="address" placeholder="Address">
<input id="contact" placeholder="Contact">
<input id="email" placeholder="Email">

<button onclick="saveProfile()">Save</button>
<button onclick="closeProfile()">Close</button>

</div>
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
projectId:"family-web-10cb8"
});
const db=firebase.firestore();

/* LOGIN */
function login(){
if(pass.value==="123"){
localStorage.setItem("user",user.value);
showApp();
}else alert("Wrong password");
}

if(localStorage.getItem("user")) showApp();

function showApp(){
loginBox.style.display="none";
app.style.display="block";
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* COLOR */
function getColor(name){
const colors={
"DELIA LOZADA":"red",
"JIMMY LOZADA":"blue",
"CHERRY GRACE LOZADA":"purple",
"CHEVY LOZADA CORTEZ":"green",
"JERBOY LOZADA":"orange",
"JENADEL LOZADA":"pink",
"JEMMEL LOZADA":"brown",
"JIMDEL LOZADA":"teal",
"JISA LOZADA":"gold"
};
return colors[name]||"black";
}

/* LAYERS */
const layer1=["DELIA LOZADA","JIMMY LOZADA"];
const layer2=["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"];
const layer3=["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"];

function render(layer,container){
layer.forEach(name=>{
container.innerHTML+=`
<div class="card" onclick="openProfile('${name}')">
<img id="img-${name}">
<h4 style="border:2px solid ${getColor(name)}; padding:5px; border-radius:6px;">
${name}
</h4>
</div>`;
loadImage(name);
});
}

render(layer1,document.getElementById("layer1"));
render(layer2,document.getElementById("layer2"));
render(layer3,document.getElementById("layer3"));

/* LOAD IMAGE */
function loadImage(name){
db.collection("photos").doc(name).get().then(doc=>{
if(doc.exists){
document.getElementById("img-"+name).src=doc.data().img;
}
});
}

/* PROFILE */
let current="";

function openProfile(name){
current=name;
profileBox.style.display="block";
profileName.innerText=name;

db.collection("profiles").doc(name).get().then(doc=>{
if(doc.exists){
let d=doc.data();
birthday.value=d.birthday||"";
address.value=d.address||"";
contact.value=d.contact||"";
email.value=d.email||"";
}
});
}

function saveProfile(){
db.collection("profiles").doc(current).set({
birthday:birthday.value,
address:address.value,
contact:contact.value,
email:email.value
});
alert("Saved!");
}

function closeProfile(){
profileBox.style.display="none";
}

window.onclick=function(e){
if(e.target==profileBox){
profileBox.style.display="none";
}
}

/* UPLOAD */
function uploadPhoto(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){
db.collection("photos").doc(current).set({img:reader.result});
loadImage(current);
};

reader.readAsDataURL(file);
}

/* COMMENTS */
function addComment(){
if(!comment.value) return;

db.collection("comments").add({
name:localStorage.getItem("user"),
text:comment.value,
likes:0
});

comment.value="";
}

db.collection("comments").onSnapshot(snap=>{
comments.innerHTML="";
snap.forEach(doc=>{
let c=doc.data();

comments.innerHTML+=`
<div class="comment">
<b>${c.name}</b><br>
${c.text}<br>
❤️ ${c.likes||0}<br>
<button onclick="like('${doc.id}',${c.likes||0})">Like</button>
<button onclick="edit('${doc.id}','${c.text}')">Edit</button>
<button onclick="del('${doc.id}')">Delete</button>
</div>`;
});
});

/* LIKE */
function like(id,likes){
db.collection("comments").doc(id).update({likes:likes+1});
}

/* DELETE */
function del(id){
db.collection("comments").doc(id).delete();
}

/* EDIT */
function edit(id,text){
let t=prompt("Edit:",text);
if(t){
db.collection("comments").doc(id).update({text:t});
}
}

</script>

</body>
</html>
