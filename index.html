<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lozada Family Ultimate</title>

<!-- ✅ FIREBASE COMPAT (NO ERROR) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {font-family: Arial; margin:0; text-align:center; background:#f0f0f0;}

header {
  background:linear-gradient(to right, red, purple);
  color:white;
  padding:15px;
}

/* LOGIN */
#loginBox {
  margin-top:100px;
}

/* FAMILY */
.layer {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin:20px 0;
}

.card {
  background:white;
  margin:10px;
  padding:10px;
  width:150px;
  border-radius:12px;
  border:3px solid purple;
  cursor:pointer;
}

img {
  width:100%;
  height:120px;
  border-radius:8px;
  background:#ddd;
}

.box {
  background:white;
  margin:20px auto;
  padding:15px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* FLOATING PROFILE */
#profileBox {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal {
  background:white;
  margin:10% auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<!-- LOGIN -->
<div id="loginBox">
  <h3>🔐 Login</h3>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="layer" id="layer1"></div>

  <div class="box">
    <input id="comment" placeholder="Write comment">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<!-- FLOATING PROFILE -->
<div id="profileBox">
  <div class="modal">
    <h3 id="profileName"></h3>

    <input id="birthday" placeholder="Birthday"><br>
    <input id="address" placeholder="Address"><br>
    <input id="contact" placeholder="Contact"><br>
    <input id="email" placeholder="Email"><br>

    <button onclick="saveProfile()">Save</button>
    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<script>

/* 🔥 FIREBASE INIT */
const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LOGIN FIX */
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(p === "123"){
    localStorage.setItem("user", u);
    showApp();
  } else {
    alert("Wrong password");
  }
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
  showApp();
}

function showApp(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* FAMILY MEMBERS */
const members = [
"DELIA LOZADA","JIMMY LOZADA",
"CHERRY GRACE","CHEVY","JERBOY",
"JENADEL","JEMMEL","JIMDEL","JISA"
];

const layer1 = document.getElementById("layer1");

members.forEach(name=>{
  layer1.innerHTML += `
    <div class="card" onclick="openProfile('${name}')">
      <h4>${name}</h4>
    </div>
  `;
});

/* PROFILE POPUP */
function openProfile(name){
  document.getElementById("profileBox").style.display = "block";
  document.getElementById("profileName").innerText = name;
}

function closeProfile(){
  document.getElementById("profileBox").style.display = "none";
}

/* COMMENTS */
function addComment(){
  let text = document.getElementById("comment").value;

  if(!text) return;

  db.collection("comments").add({
    name: localStorage.getItem("user"),
    text: text
  });

  document.getElementById("comment").value="";
}

/* REALTIME COMMENTS */
db.collection("comments").onSnapshot(snapshot=>{
  let html = "";

  snapshot.forEach(doc=>{
    let c = doc.data();
    html += `<div>${c.name}: ${c.text}</div>`;
  });

  document.getElementById("comments").innerHTML = html;
});

</script>

</body>
</html>
