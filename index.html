<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {
      font-family: Arial;
      background:#111;
      margin:0;
      text-align:center;
      color:white;
    }

    header {
      background:linear-gradient(to right, red, purple);
      padding:15px;
      font-size:22px;
      position:sticky;
      top:0;
      z-index:3000;
    }

    .header-title { text-transform:uppercase; }
    .quote { font-size:12px; opacity:0.8; }

    #loginBox {
      margin:80px auto 10px;
      width:90%;
      max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    #loginBox input {
      width:90%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 15px;
      background:purple;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
      cursor:pointer;
    }

    #credit { font-size:12px; opacity:0.7; margin-top:5px; }

    .layer, .layer.fixed {
      display:grid;
      grid-template-columns:repeat(4,180px);
      justify-content:center;
      gap:30px;
      margin:30px auto;
    }

    #layer1, #layer2, #layer3 {
      gap:40px;
      margin:40px auto;
    }

    .card {
      background:#1c1c1c;
      padding:12px;
      border-radius:14px;
      border:2px solid purple;
      width:180px;
      box-shadow:0 0 10px rgba(255,0,255,0.3);
    }

    img {
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      cursor:pointer;
    }

    .title {
      border:2px solid red;
      padding:6px 15px;
      border-radius:8px;
      display:inline-block;
      margin-top:20px;
    }

    .family-section {
      position:relative;
      padding:20px 10px;
      overflow:hidden;
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    }

    .family-video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:1;
    }

    .content { position:relative; z-index:2; }

    .pamangkin-section {
      background:repeating-linear-gradient(45deg,#1a1a1a,#1a1a1a 10px,#222 10px,#222 20px);
      padding:20px;
    }

    .gallery-section {
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      padding:20px;
    }

    #profileBox {
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#222;
      padding:20px;
      border-radius:12px;
      z-index:2000;
    }

    #zoomBox {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.95);
      z-index:1500;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

  </style>
</head>

<body>

<header>
  <div class="header-title">LOZADA FAMILY ULTIMATE</div>
  <div class="quote">"Family is everything."</div>
</header>

<div id="loginBox">
  <h2>HI WELCOME</h2>
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="credit">CREATED BY: JEMMEL LOZADA</div>

<div id="app" style="display:none;"></div>

<div id="profileBox"></div>

<div id="zoomBox">
  <img id="zoomImg">
  <button onclick="closeAll()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentZoom="";

window.login=()=>{
  loginBox.style.display="none";
  credit.style.display="none";
  app.style.display="block";
};

/* 🔥 FIXED UPLOAD */
window.upload=async(e,id)=>{
  try{
    const file = e.target.files[0];
    if(!file){
      alert("No file selected ❌");
      return;
    }

    const reader = new FileReader();

    reader.onload=async()=>{
      await setDoc(doc(db,"familyTree",id),{
        image: reader.result,
        updated: Date.now()
      });

      alert("Uploaded successfully ✅");
    };

    reader.readAsDataURL(file);

  }catch(err){
    console.log(err);
    alert("Upload failed ❌");
  }
};

window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="flex";
};

window.closeAll=()=>{
  zoomBox.style.display="none";
};

</script>

</body>
</html>
