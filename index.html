     <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOZADA FAMILY</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f0f0;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 30px;
    }

    .section {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
    }

    .name {
      margin-top: 10px;
      font-weight: bold;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <h1>👨‍👩‍👧‍👦 Lozada Family</h1>
  <p>7 Siblings ❤️</p>
</header>

<div class="section">
  <h2>OUR FAMILY MEMBERS</h2>

  <div class="grid">

    <!-- MEMBER TEMPLATE -->
    <div class="card">
      <img id="img1">
      <input type="file" accept="image/*" onchange="saveImage(event, 'img1')">
      <div class="name">CHERRY GRACE LOZADA</div>
    </div>

    <div class="card">
      <img id="img2">
      <input type="file" onchange="saveImage(event, 'img2')">
      <div class="name">CHEVY LOZADA CORTEZ</div>
    </div>

    <div class="card">
      <img id="img3">
      <input type="file" onchange="saveImage(event, 'img3')">
      <div class="name">JERBOY LOZADA</div>
    </div>

    <div class="card">
      <img id="img4">
      <input type="file" onchange="saveImage(event, 'img4')">
      <div class="name">JENADEL LOZADA</div>
    </div>

    <div class="card">
      <img id="img5">
      <input type="file" onchange="saveImage(event, 'img5')">
      <div class="name">JEMMEL LOZADA</div>
    </div>

    <div class="card">
      <img id="img6">
      <input type="file" onchange="saveImage(event, 'img6')">
      <div class="name">JIMDEL LOZADA</div>
    </div>

    <div class="card">
      <img id="img7">
      <input type="file" onchange="saveImage(event, 'img7')">
      <div class="name">JISA LOZADA</div>
    </div>

  </div>
</div>

<script>
// SAVE IMAGE
function saveImage(event, id) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    localStorage.setItem(id, reader.result);
    document.getElementById(id).src = reader.result;
  };

  reader.readAsDataURL(file);
}

// LOAD SAVED IMAGES
window.onload = function() {
  for (let i = 1; i <= 7; i++) {
    const saved = localStorage.getItem("img" + i);
    if (saved) {
      document.getElementById("img" + i).src = saved;
    } else {
      document.getElementById("img" + i).src = "https://via.placeholder.com/300";
    }
  }
}
</script>

</body>
</html>
