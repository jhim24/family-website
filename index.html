<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {
      font-family: Arial;
      background:#111;
      margin:0;
      text-align:center;
      color:white;
    }

    header {
      background:linear-gradient(to right, red, purple);
      padding:25px;
      font-size:28px;
      font-weight:bold;
    }

    .quote {
      font-size:14px;
      opacity:0.8;
    }

    #loginBox {
      margin:80px auto;
      width:90%;
      max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    input {
      width:90%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 15px;
      background:purple;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
    }

    #credit {font-size:12px; opacity:0.7;}

    /* 🔥 FAMILY VIDEO */
    .family-section {
      position:relative;
      overflow:hidden;
      padding:20px;
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    }

    .family-video {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:1;
    }

    .content {
      position:relative;
      z-index:2;
    }

    .layer {
      display:grid;
      grid-template-columns:repeat(4,150px);
      justify-content:center;
      gap:20px;
      margin:20px auto;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:12px;
      border:2px solid purple;
      width:150px;
    }

    img {
      width:100%;
      aspect-ratio:16/9;
      border-radius:8px;
      cursor:pointer;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      cursor:pointer;
    }

    .title {
      border:2px solid red;
      padding:6px 15px;
      border-radius:8px;
      display:inline-block;
    }

  </style>
</head>

<body>

<header>
  🏡 LOZADA FAMILY ULTIMATE
  <div class="quote">"Family is everything."</div>
</header>

<div id="loginBox">
  <h2>HI WELCOME</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="credit">CREATED BY: JEMMEL LOZADA</div>

<div id="app" style="display:none;">

  <!-- 🔥 FAMILY VIDEO -->
  <div class="family-section">

    <video id="bgVideo" class="family-video" autoplay muted loop playsinline></video>

    <div class="overlay"></div>

    <div class="content">
      <h2 class="title">FAMILY</h2>

      <!-- 🔥 UPLOAD BUTTON -->
      <br>
      <input type="file" accept="video/*" onchange="uploadVideo(event)">

      <div class="layer" id="layer1"></div>
      <div class="layer" id="layer2"></div>
      <div class="layer" id="layer3"></div>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
});

const db = getFirestore(app);

let isAdmin=false;

// LOGIN
window.login=()=>{
  if(user.value==="admin" && pass.value==="123"){
    isAdmin=true;
  }

  if(pass.value==="123"){
    loginBox.style.display="none";
    credit.style.display="none";
    app.style.display="block";
    loadVideo();
  }
};

// 🔥 LOAD SAVED VIDEO
async function loadVideo(){
  const snap = await getDoc(doc(db,"settings","bgVideo"));
  if(snap.exists()){
    bgVideo.src = snap.data().url;
  }
}

// 🔥 UPLOAD VIDEO
window.uploadVideo=(e)=>{
  if(!isAdmin) return alert("Admin only");

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async ()=>{
    const videoData = reader.result;

    bgVideo.src = videoData;

    await setDoc(doc(db,"settings","bgVideo"),{
      url: videoData
    });
  };

  reader.readAsDataURL(file);
};

</script>

</body>
</html>
