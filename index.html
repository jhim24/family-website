<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {
      font-family: Arial;
      background:#111;
      margin:0;
      text-align:center;
      color:white;
    }

    header {
      background:linear-gradient(to right, red, purple);
      padding:15px;
      font-size:22px;
    }

    #loginBox {
      margin:80px auto 10px;
      width:90%;
      max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    #loginBox input {
      width:90%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 15px;
      background:purple;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
    }

    #credit {
      font-size:12px;
      opacity:0.7;
    }

    .layer {
      display:grid;
      grid-template-columns:repeat(4,150px);
      justify-content:center;
      gap:20px;
      margin:20px auto;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:12px;
      border:2px solid purple;
      width:150px;
    }

    img {
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      cursor:pointer;
    }

    .title {
      border:2px solid red;
      padding:6px 15px;
      border-radius:8px;
      display:inline-block;
      margin-top:20px;
    }

    .family-section {
      position:relative;
      padding:20px;
      overflow:hidden;
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    }

    .family-video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:1;
    }

    .content {
      position:relative;
      z-index:2;
    }

    .pamangkin-section {
      background:repeating-linear-gradient(45deg,#1a1a1a,#1a1a1a 10px,#222 10px,#222 20px);
      padding:20px;
    }

    .gallery-section {
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      padding:20px;
    }

    #profileBox {
      display:none;
      position:fixed;
      z-index:2000;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:20px;
      border-radius:12px;
    }

    /* 🔥 FIX LANG ITO */
    #zoomBox {
      display:none; /* ← eto lang binago */
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.95);
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:2000;
    }

    #zoomBox img {
      width:90%;
      max-width:900px;
    }

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<div id="loginBox">
  <h2>HI WELCOME</h2>
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="credit">CREATED BY: JEMMEL LOZADA</div>

<div id="app" style="display:none;">

  <div class="family-section">
    <video id="bgVideo" class="family-video" autoplay muted loop>
      <source id="bgSource" src="https://cdn.coverr.co/videos/coverr-modern-house-with-pool-1573/1080p.mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
      <h2 class="title">FAMILY</h2>
      <button onclick="nextVideo()">Next Background</button>

      <div class="layer" id="layer1"></div>
      <div class="layer" id="layer2"></div>
      <div class="layer" id="layer3"></div>
    </div>
  </div>

  <div class="pamangkin-section">
    <h2 class="title">PAMANGKIN</h2>
    <div class="layer" id="pamangkin1"></div>
    <div class="layer" id="pamangkin2"></div>
  </div>

  <div class="gallery-section">
    <h2 class="title">GALLERY</h2>
    <div class="layer" id="gallery1"></div>
    <div class="layer" id="gallery2"></div>
    <div class="layer" id="gallery3"></div>
    <div class="layer" id="gallery4"></div>
    <div class="layer" id="gallery5"></div>
  </div>

</div>

<div id="zoomBox">
  <img id="zoomImg">
  <button onclick="deletePhoto()">Delete</button>
  <button onclick="closeAll()">Close</button>
</div>

<script>
function login(){
  loginBox.style.display="none";
  credit.style.display="none";
  app.style.display="block";
}
</script>

</body>
</html>
