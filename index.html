<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {
      font-family: Arial;
      background:#111;
      margin:0;
      text-align:center;
      color:white;
    }

    header {
      background:linear-gradient(to right, red, purple);
      padding:15px;
      font-size:22px;
    }

    #loginBox {
      margin:80px auto 10px;
      width:90%;
      max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    #loginBox input {
      width:90%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 15px;
      background:purple;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
    }

    #credit {
      font-size:12px;
      opacity:0.7;
    }

    .layer {
      display:grid;
      grid-template-columns:repeat(4,150px);
      justify-content:center;
      gap:20px;
      margin:20px auto;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:12px;
      border:2px solid purple;
      width:150px;
    }

    img {
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      cursor:pointer;
    }

    .title {
      border:2px solid red;
      padding:6px 15px;
      border-radius:8px;
      display:inline-block;
      margin-top:20px;
    }

    .family-section {
      position:relative;
      padding:20px;
      overflow:hidden;
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    }

    .family-video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:1;
    }

    .content {
      position:relative;
      z-index:2;
    }

    .pamangkin-section {
      background:repeating-linear-gradient(45deg,#1a1a1a,#1a1a1a 10px,#222 10px,#222 20px);
      padding:20px;
    }

    .gallery-section {
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      padding:20px;
    }

    #zoomBox {
      display:none; /* FIXED */
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.95);
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:2000;
    }

    #zoomBox img {
      width:90%;
      max-width:900px;
    }

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<div id="loginBox">
  <h2>HI WELCOME</h2>
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="credit">CREATED BY: JEMMEL LOZADA</div>

<div id="app" style="display:none;">

  <!-- FAMILY -->
  <div class="family-section">
    <video id="bgVideo" class="family-video" autoplay muted loop playsinline>
      <source id="bgSource"
        src="https://cdn.coverr.co/videos/coverr-modern-house-with-pool-1573/1080p.mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
      <h2 class="title">FAMILY</h2>
      <button onclick="nextVideo()">Next Background</button>

      <div class="layer" id="layer1"></div>
      <div class="layer" id="layer2"></div>
      <div class="layer" id="layer3"></div>
    </div>
  </div>

  <!-- PAMANGKIN -->
  <div class="pamangkin-section">
    <h2 class="title">PAMANGKIN</h2>
    <div class="layer" id="pamangkin1"></div>
    <div class="layer" id="pamangkin2"></div>
  </div>

  <!-- GALLERY -->
  <div class="gallery-section">
    <h2 class="title">GALLERY</h2>
    <div class="layer" id="gallery1"></div>
    <div class="layer" id="gallery2"></div>
    <div class="layer" id="gallery3"></div>
    <div class="layer" id="gallery4"></div>
    <div class="layer" id="gallery5"></div>
  </div>

</div>

<!-- ZOOM -->
<div id="zoomBox">
  <img id="zoomImg">
  <button onclick="deletePhoto()">Delete</button>
  <button onclick="closeAll()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentZoom="";

// LOGIN
window.login=()=>{
  loginBox.style.display="none";
  credit.style.display="none";
  app.style.display="block";
};

// VIDEO
let vids=[
  "https://cdn.coverr.co/videos/coverr-modern-house-with-pool-1573/1080p.mp4",
  "https://cdn.coverr.co/videos/coverr-luxury-home-exterior-2605/1080p.mp4"
];

let i=0;
window.nextVideo=()=>{
  i=(i+1)%vids.length;
  bgSource.src=vids[i];
  bgVideo.load();
};

// DATA
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye"],
  pamangkin2:["Sherwin","Ashley","Union","Jazmine"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","",""]; }

// CREATE
function create(data){
  Object.keys(data).forEach(k=>{
    const c=document.getElementById(k);

    data[k].forEach((name,i)=>{
      const id=k+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

// UPLOAD
window.upload=(e,id)=>{
  const r=new FileReader();
  r.onload=()=>setDoc(doc(db,"familyTree",id),{image:r.result});
  r.readAsDataURL(e.target.files[0]);
};

// ZOOM
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="flex";
};

// DELETE
window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
  zoomBox.style.display="none";
};

// CLOSE
window.closeAll=()=>{
  zoomBox.style.display="none";
};

</script>

</body>
</html>
