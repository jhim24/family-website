<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#111; margin:0; text-align:center; color:white;}
    header {background:linear-gradient(to right, red, purple); padding:15px; font-size:22px;}

    /* FAMILY (UNCHANGED) */
    .layer {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      margin:20px 0;
    }

    /* 🔥 PAMANGKIN + GALLERY (FIXED FLEX) */
    .layer.fixed {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:20px;
      padding:15px;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:12px;
      border:2px solid purple;
      box-shadow:0 0 10px rgba(255,0,255,0.3);
      transition:0.3s;
    }

    .card:hover {transform:translateY(-3px);}

    /* 🔥 FIXED SIZE (HINDI NA LALAKI) */
    .card.pamangkin,
    .card.gallery {
      width:150px;
    }

    img {
      width:100%;
      height:110px;
      object-fit:cover;
      border-radius:8px;
      background:#333;
      border:1px solid #555;
      margin-bottom:8px;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      margin:5px 0;
      cursor:pointer;
    }

    input {
      width:90%;
      margin-top:5px;
    }

    .title {
      border:2px solid red;
      display:inline-block;
      padding:6px 15px;
      border-radius:8px;
      margin-top:20px;
    }

    button {
      padding:6px 10px;
      background:purple;
      color:white;
      border:none;
      border-radius:5px;
    }

    #profileBox, #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:20px;
      border-radius:12px;
      z-index:1000;
      width:90%;
      max-width:300px;
    }

    #overlay {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    #zoomBox img {width:100%;}

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<div id="loginBox">
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <!-- FAMILY -->
  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- PAMANGKIN -->
  <h2 class="title">PAMANGKIN</h2>
  <div class="layer fixed" id="pamangkin1"></div>
  <div class="layer fixed" id="pamangkin2"></div>

  <!-- GALLERY -->
  <h2 class="title">GALLERY</h2>
  <div class="layer fixed" id="gallery1"></div>
  <div class="layer fixed" id="gallery2"></div>
  <div class="layer fixed" id="gallery3"></div>
  <div class="layer fixed" id="gallery4"></div>
  <div class="layer fixed" id="gallery5"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <!-- PROFILE -->
  <div id="profileBox">
    <h3 id="profileName"></h3>
    <input id="birthday"><br>
    <input id="address"><br>
    <input id="contact"><br>
    <input id="email"><br>
    <button onclick="saveProfile()">Save</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <!-- ZOOM -->
  <div id="zoomBox">
    <img id="zoomImg"><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentZoom="", currentProfile="";

// LOGIN
window.login=()=>{
  if(pass.value==="123"){
    currentUser=user.value;
    loginBox.style.display="none"; app.style.display="block";
  }
};

// FAMILY
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

// PAMANGKIN
const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin"],
  pamangkin2:["Ashley","Union","Jazmine","Apple","Bjoy"]
};

// GALLERY
const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","","",""]; }

// CREATE
function create(data,type=""){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      let click="";
      if(type!=="gallery"){
        click=`onclick="openProfile('${id}','${name}')"`
      }

      c.innerHTML+=`
      <div class="card ${type}">
        <img id="${id}" onclick="zoom('${id}')">
        <h4 ${click}>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin,"pamangkin");
create(gallery,"gallery");

// UPLOAD
window.upload=(e,id)=>{
  const r=new FileReader();
  r.onload=()=>setDoc(doc(db,"familyTree",id),{image:r.result});
  r.readAsDataURL(e.target.files[0]);
};

// ZOOM
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

// DELETE
window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
};

// PROFILE
window.openProfile=(id,name)=>{
  currentProfile=id;
  profileName.innerText=name;
  profileBox.style.display="block";
  overlay.style.display="block";
};

window.saveProfile=()=>{
  setDoc(doc(db,"profiles",currentProfile),{
    birthday:birthday.value,
    address:address.value,
    contact:contact.value,
    email:email.value
  });
};

// CLOSE
window.closeAll=()=>{
  zoomBox.style.display="none";
  profileBox.style.display="none";
  overlay.style.display="none";
};

</script>

</body>
</html>
