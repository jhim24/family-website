<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}

    header {
      background:linear-gradient(to right, red, purple);
      color:white;
      padding:20px;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .header-title {font-size:28px; font-weight:bold;}
    .header-quote {font-size:14px; font-style:italic;}

    .layer {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap:15px;
      justify-items:center;
      padding:10px;
      max-width:1000px;
      margin:auto;
    }

    .card {
      background:white;
      padding:10px;
      width:140px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
    }

    img {
      width:100%;
      height:120px;
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
    }

    .title {
      border:3px solid red;
      padding:5px 15px;
      border-radius:8px;
      background:white;
      display:inline-block;
      margin-top:20px;
    }

    input {width:90%; margin:5px;}
    button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

    /* BACKGROUNDS */
    .pamangkin-bg {
      background:linear-gradient(to right, #ffe0e0, #ffd6ff);
      padding:20px;
      border-radius:12px;
      margin:10px;
    }

    .gallery-bg {
      background:linear-gradient(to right, #d0f0ff, #e0fff5);
      padding:20px;
      border-radius:12px;
      margin:10px;
    }

    /* ZOOM */
    #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:20px;
      border-radius:12px;
      z-index:1000;
      box-shadow:0 0 20px rgba(0,0,0,0.6);
    }

    #zoomBox img {
      width:50vw;
      max-width:400px;
      border-radius:10px;
    }

    #overlay {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      top:0; left:0;
      z-index:999;
    }

    .box {
      background:white;
      margin:20px auto;
      padding:10px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    .comment {
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }
  </style>
</head>

<body>

<header>
  <div class="header-title">LOZADA FAMILY ULTIMATE</div>
  <div class="header-quote">"Family is not an important thing, it's everything."</div>
</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- FAMILY -->
  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- PAMANGKIN -->
  <h2 class="title">PAMANGKIN</h2>
  <div class="pamangkin-bg">
    <div class="layer" id="pamangkin1"></div>
    <div class="layer" id="pamangkin2"></div>
  </div>

  <!-- GALLERY -->
  <h2 class="title">GALLERY</h2>
  <div class="gallery-bg">
    <div class="layer" id="gallery1"></div>
    <div class="layer" id="gallery2"></div>
    <div class="layer" id="gallery3"></div>
    <div class="layer" id="gallery4"></div>
    <div class="layer" id="gallery5"></div>
  </div>

  <div id="overlay" onclick="closeAll()"></div>

  <!-- ZOOM -->
  <div id="zoomBox">
    <img id="zoomImg"><br><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <!-- COMMENTS -->
  <div class="box">
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentZoom="";

/* AUTO LOGIN */
const savedUser = localStorage.getItem("user");
if(savedUser){
  currentUser = savedUser;
  loginBox.style.display="none";
  app.style.display="block";
}

/* LOGIN */
window.login=()=>{
  if(pass.value==="123"){
    currentUser=user.value;
    localStorage.setItem("user",user.value);
    loginBox.style.display="none";
    app.style.display="block";
  } else alert("Wrong password");
};

/* DATA */
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye"],
  pamangkin2:["Sherwin","Ashley","Union","Jazmine","Apple","Bjoy"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","",""]; }

/* CREATE */
function create(data){
  Object.keys(data).forEach(layer=>{
    const c=document.getElementById(layer);

    data[layer].forEach((name,i)=>{
      const id=layer+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      loadImage(id);

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

/* LOAD FIX */
async function loadImage(id){
  const snap = await getDoc(doc(db,"familyTree",id));
  if(snap.exists()){
    document.getElementById(id).src=snap.data().image;
  }
}

create(layers);
create(pamangkin);
create(gallery);

/* UPLOAD FIX (COMPRESSED) */
window.upload=(e,id)=>{
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=function(){
    const img=new Image();
    img.src=reader.result;

    img.onload=async function(){
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");

      const scale=300/img.width;
      canvas.width=300;
      canvas.height=img.height*scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      const compressed=canvas.toDataURL("image/jpeg",0.7);

      await setDoc(doc(db,"familyTree",id),{
        image:compressed
      });
    };
  };

  reader.readAsDataURL(file);
};

/* ZOOM */
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

/* DELETE */
window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
};

/* CLOSE */
window.closeAll=()=>{
  zoomBox.style.display="none";
  overlay.style.display="none";
};

/* COMMENTS */
window.addComment=()=>{
  if(!comment.value) return;

  addDoc(collection(db,"comments"),{
    name:currentUser,
    text:comment.value,
    time:Date.now()
  });

  comment.value="";
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    comments.innerHTML+=`<div class="comment"><b>${c.name}</b><br>${c.text}</div>`;
  });
});

</script>

</body>
</html>
