<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#111; margin:0; text-align:center; color:white;}

    header {
      background:linear-gradient(to right, red, purple);
      padding:15px;
      font-size:22px;
      position:sticky;
      top:0;
      z-index:3000;
    }

    .header-title { text-transform:uppercase; }
    .quote { font-size:12px; opacity:0.8; }

    #loginBox {
      margin:80px auto 10px;
      width:90%;
      max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    #loginBox input {
      width:90%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 15px;
      background:purple;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
      cursor:pointer;
    }

    .layer, .layer.fixed {
      display:grid;
      grid-template-columns:repeat(4,180px);
      justify-content:center;
      gap:30px;
      margin:30px auto;
    }

    .card {
      background:#1c1c1c;
      padding:12px;
      border-radius:14px;
      border:2px solid purple;
      width:180px;
    }

    img {
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    h4 {
      font-size:12px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
    }

    .title {
      border:2px solid red;
      padding:6px 15px;
      border-radius:8px;
      display:inline-block;
      margin-top:20px;
    }

    #zoomBox {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    #zoomImg {
      width:60%;
      max-width:500px;
      border-radius:12px;
    }
  </style>
</head>

<body>

<header>
  <div class="header-title">LOZADA FAMILY ULTIMATE</div>
  <div class="quote">"Family is not an important thing. It's everything."</div>
</header>

<div id="loginBox">
  <h2>HI WELCOME</h2>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <h2 class="title">FAMILY</h2>
  <div class="layer" id="layer1"></div>

</div>

<div id="zoomBox">
  <img id="zoomImg">
  <button onclick="closeAll()">Close</button>
</div>

<script>

window.login=()=>{
  loginBox.style.display="none";
  app.style.display="block";
};

const data={
  layer1:["DELIA LOZADA","JIMMY LOZADA","JEMMEL LOZADA","JISA LOZADA"]
};

function create(data){
  Object.keys(data).forEach(k=>{
    const c=document.getElementById(k);

    data[k].forEach((name,i)=>{
      const id=k+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      /* LOAD SAVED IMAGE */
      const saved = localStorage.getItem(id);
      if(saved){
        document.getElementById(id).src = saved;
      }
    });
  });
}

create(data);

/* 🔥 CLOUDINARY UPLOAD */
window.upload = async(e,id)=>{
  const file=e.target.files[0];
  if(!file) return;

  const formData=new FormData();
  formData.append("file",file);
  formData.append("upload_preset","family_upload"); // palitan kung iba

  const res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload",{
    method:"POST",
    body:formData
  });

  const data = await res.json();

  const url = data.secure_url;

  document.getElementById(id).src = url;

  /* SAVE LOCAL */
  localStorage.setItem(id,url);

  alert("Upload success!");
};

window.zoom=(id)=>{
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="flex";
};

window.closeAll=()=>{
  zoomBox.style.display="none";
};

</script>

</body>
</html>
