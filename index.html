<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}

    header {
      background:linear-gradient(to right, red, purple);
      color:white;
      padding:20px;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .header-title {font-size:28px; font-weight:bold;}
    .header-quote {font-size:14px; font-style:italic;}

    /* 🔥 LOGIN */
    #loginBox {
      background:white;
      padding:25px;
      border-radius:12px;
      width:90%;
      max-width:320px;
      margin:60px auto;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
      border:3px solid purple;
    }

    #loginBox input {
      width:90%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #loginBox button {
      width:95%;
      padding:10px;
      background:linear-gradient(to right, purple, red);
      color:white;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .creator {
      margin-top:15px;
      font-size:12px;
      color:gray;
      border-top:1px solid #ddd;
      padding-top:10px;
    }

    .layer {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}

    .card {
      background:white; margin:10px; padding:10px;
      width: clamp(140px, 22vw, 180px);
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
    }

    img {
      width:100%;
      height: clamp(110px, 18vw, 150px);
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
    }

    h4 {
      font-size:13px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      cursor:pointer;
    }

    .title {
      border:3px solid red;
      display:inline-block;
      padding:5px 15px;
      border-radius:8px;
      background:white;
    }

    .box {background:white; margin:20px auto; padding:15px; width:90%; max-width:400px; border-radius:10px;}
    .comment {background:#fff; padding:10px; margin:5px; border-radius:8px;}

    #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:25px;
      border-radius:12px;
      z-index:1000;
    }

    #zoomBox img {
      width:50vw;
      max-width:500px;
      border-radius:12px;
    }

    #overlay {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      top:0;
      left:0;
      z-index:999;
    }

    .family-bg {
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      padding:20px 0;
      border-radius:12px;
      margin:10px;
    }

    #profileBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:20px;
      border-radius:12px;
      z-index:1000;
    }

  </style>
</head>

<body>

<header>
  <div class="header-title">👨‍👩‍👧‍👦 LOZADA FAMILY ULTIMATE</div>
  <div class="header-quote">"Family is not an important thing, it's everything."</div>
</header>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>🔐 LOGIN</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">LOGIN</button>

  <div class="creator">
    Created by <b>JEMMEL LOZADA</b>
  </div>
</div>

<div id="app" style="display:none;">

  <div class="family-bg">
    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>
    <div class="layer" id="layer3"></div>
  </div>

  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <div id="zoomBox">
    <img id="zoomImg"><br><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <div id="profileBox">
    <h3 id="profileName"></h3>
    <input id="birthday"><br>
    <input id="address"><br>
    <input id="contact"><br>
    <input id="email"><br>
    <button onclick="saveProfile()">Save</button>
    <button onclick="closeProfile()">Close</button>
  </div>

  <div class="box">
    <input id="comment">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentZoom="", currentProfile="";

/* 🔐 LOGIN SYSTEM */
const savedUser = localStorage.getItem("user");

if(savedUser){
  currentUser = savedUser;
  loginBox.style.display="none";
  app.style.display="block";
}

window.login = function(){
  const u = user.value.trim();
  const p = pass.value.trim();

  if(!u){
    alert("Enter username");
    return;
  }

  // ADMIN
  if(u === "admin" && p === "1234"){
    currentUser = "ADMIN";
    localStorage.setItem("user","ADMIN");
    loginBox.style.display="none";
    app.style.display="block";
    alert("Welcome ADMIN 🔥");
    return;
  }

  // USER
  if(p === "123"){
    currentUser = u;
    localStorage.setItem("user",u);
    loginBox.style.display="none";
    app.style.display="block";
    return;
  }

  alert("Wrong username or password");
};

/* DATA */
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin"],
  pamangkin2:["Ashley","Union","Jazmine","Apple","Bjoy"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","","",""]; }

/* CREATE */
function create(data){
  Object.keys(data).forEach(layer=>{
    const c=document.getElementById(layer);

    data[layer].forEach((name,i)=>{
      const id=layer+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4 onclick="openProfile('${name}','${id}')">${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

/* UPLOAD */
window.upload=(e,id)=>{
  const reader=new FileReader();
  reader.onload=()=>setDoc(doc(db,"familyTree",id),{image:reader.result});
  reader.readAsDataURL(e.target.files[0]);
};

/* ZOOM */
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

window.deletePhoto=async()=>await deleteDoc(doc(db,"familyTree",currentZoom));

window.closeAll=()=>{
  zoomBox.style.display="none";
  profileBox.style.display="none";
  overlay.style.display="none";
};

/* PROFILE */
window.openProfile=async(name,id)=>{
  currentProfile=id;
  profileBox.style.display="block";
  overlay.style.display="block";
  profileName.innerText=name;

  const snap=await getDoc(doc(db,"profiles",id));
  if(snap.exists()){
    const d=snap.data();
    birthday.value=d.birthday||"";
    address.value=d.address||"";
    contact.value=d.contact||"";
    email.value=d.email||"";
  }
};

window.saveProfile=async()=>{
  await setDoc(doc(db,"profiles",currentProfile),{
    birthday:birthday.value,
    address:address.value,
    contact:contact.value,
    email:email.value
  });
  alert("Saved!");
};

window.closeProfile=()=>closeAll();

/* COMMENTS */
window.addComment=()=>{
  if(!comment.value) return;

  addDoc(collection(db,"comments"),{
    name:currentUser,
    text:comment.value,
    time:Date.now()
  });

  comment.value="";
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    comments.innerHTML+=`<div class="comment"><b>${c.name}</b><br>${c.text}</div>`;
  });
});

</script>

</body>
</html>
