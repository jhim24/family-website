<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}

    header {
      background:linear-gradient(to right, red, purple);
      color:white;
      padding:20px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .header-title {font-size:28px; font-weight:bold; letter-spacing:2px;}
    .header-quote {font-size:14px; margin-top:5px; font-style:italic;}

    .layer {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}

    .card {
      background:white;
      margin:10px;
      padding:10px;
      width: clamp(140px, 22vw, 180px);
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
      cursor:pointer;
    }

    img {
      width:100%;
      height: clamp(110px, 18vw, 150px);
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
    }

    h4 {
      font-size:13px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
    }

    .title {
      border:3px solid red;
      display:inline-block;
      padding:5px 15px;
      border-radius:8px;
      background:white;
    }

    input {width:90%; padding:6px; margin:5px;}
    button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

    .box {
      background:white;
      margin:20px auto;
      padding:15px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    .comment {
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    .login-box {
      background:url('https://images.unsplash.com/photo-1614064641938-3bbee52942c7') center/cover no-repeat;
      border:4px solid purple;
      border-radius:15px;
      padding:20px;
      width:90%;
      max-width:350px;
      margin:50px auto;
      color:white;
      box-shadow:0 0 20px rgba(128,0,128,0.6);
    }

    .login-box input {
      width:90%;
      padding:8px;
      margin:6px;
      border-radius:6px;
      border:none;
    }

    .login-box button {
      background:red;
      font-weight:bold;
    }

    .creator {
      margin-top:10px;
      font-size:12px;
    }

    #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:25px;
      border-radius:12px;
      z-index:1000;
    }

    #zoomBox img {
      width:50vw;
      max-width:500px;
      height:auto;
      border-radius:12px;;
    }

    #overlay {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    .family-bg {
      background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      padding:20px 0;
      border-radius:12px;
      margin:10px;
    }
  </style>
</head>

<body>

<header>
  <div class="header-title">👨‍👩‍👧‍👦 LOZADA FAMILY ULTIMATE</div>
  <div class="header-quote">"Family is not an important thing, it's everything."</div>
</header>

<div id="loginBox" class="login-box">
  <h2>🔐 LOGIN</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">LOGIN</button>
  <p class="creator">Created by JHIM LOZADA</p>
</div>

<div id="app" style="display:none;">

  <div class="family-bg">
    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>
    <div class="layer" id="layer3"></div>
  </div>

  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <div id="zoomBox">
    <img id="zoomImg"><br><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <div class="box">
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentZoom="";

/* 🔥 LEVEL 5 ADDITIONS START */

/* SESSION */
const savedUser = localStorage.getItem("user");
if(savedUser){
  currentUser = savedUser;
  loginBox.style.display="none";
  app.style.display="block";
}

/* MULTI USER LOGIN */
window.login = async function(){
  const u = user.value.trim();
  const p = pass.value.trim();

  if(u === "admin" && p === "1234"){
    currentUser="ADMIN";
    localStorage.setItem("user","ADMIN");
    loginBox.style.display="none";
    app.style.display="block";
    setOnlineStatus();
    return;
  }

  const userRef = doc(db,"users",u);
  onSnapshot(userRef,(snap)=>{
    if(!snap.exists()) return alert("User not found");
    const d = snap.data();

    if(d.password !== p) return alert("Wrong password");

    currentUser = d.name || u;
    localStorage.setItem("user",currentUser);

    loginBox.style.display="none";
    app.style.display="block";
    setOnlineStatus();
  });
};

/* ONLINE STATUS */
function setOnlineStatus(){
  if(!currentUser) return;
  setDoc(doc(db,"onlineUsers",currentUser),{
    name:currentUser,
    time:Date.now()
  });
}

/* PROFILE PICTURE */
window.setProfile = async (base64)=>{
  await setDoc(doc(db,"profiles",currentUser),{img:base64});
};

/* CHAT SYSTEM */
window.sendChat = async ()=>{
  if(!chatInput.value) return;

  await addDoc(collection(db,"chat"),{
    name:currentUser,
    text:chatInput.value,
    time:Date.now()
  });

  chatInput.value="";
};

const chatBox=document.createElement("div");
chatBox.style="position:fixed;bottom:0;right:0;width:300px;background:white;border-radius:10px 10px 0 0;box-shadow:0 0 10px rgba(0,0,0,0.3);";
chatBox.innerHTML=`
<div style="background:purple;color:white;padding:5px;">Chat</div>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput" placeholder="Message..." style="width:70%">
<button onclick="sendChat()">Send</button>
`;
document.body.appendChild(chatBox);

onSnapshot(query(collection(db,"chat"),orderBy("time")),(snap)=>{
  chatMessages.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    chatMessages.innerHTML+=`<div><b>${c.name}:</b> ${c.text}</div>`;
  });
  chatMessages.scrollTop = chatMessages.scrollHeight;
});

/* NOTIFICATIONS */
window.notify = (msg)=>{
  alert("🔔 "+msg);
};

/* CREATE USER */
window.createUser = async (u,p,n)=>{
  await setDoc(doc(db,"users",u),{username:u,password:p,name:n});
};

/* 🔥 LEVEL 5 ADDITIONS END */

const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin"],
  pamangkin2:["Ashley","Union","Jazmine","Apple","Bjoy"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","","",""]; }

function create(data){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

/* KEEP ALL YOUR ORIGINAL FUNCTIONS BELOW (UNCHANGED) */

</script>

</body>
</html>
