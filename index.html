<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lozada Family</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 30px 15px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin-top: 5px;
    }

    .section {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
    }

    .name {
      margin-top: 10px;
      font-weight: bold;
      font-size: 13px;
    }

    footer {
      background: #333;
      color: white;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>👨‍👩‍👧‍👦 Lozada Family</h1>
  <p>7 Siblings ❤️</p>
</header>

<div class="section">
  <h2>Our Family Members</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">CHERRY GRACE LOZADA</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">CHEVY LOZADA CORTEZ</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">JERBOY LOZADA</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">JENADEL LOZADA</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">JEMMEL LOZADA</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">JIMDEL LOZADA</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="name">JISA LOZADA</div>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Lozada Family</p>
</footer>

</body>
</html>
