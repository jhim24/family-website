<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}
    header {background:linear-gradient(to right, red, purple); color:white; padding:15px; font-size:22px;}

    .layer {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      margin:20px 0;
    }

    /* 🔥 ORIGINAL CARD STYLE (FLOATING + BORDER) */
    .card {
      background:white;
      margin:12px;
      padding:10px;
      width:150px;
      border-radius:12px;
      box-shadow:0 6px 15px rgba(0,0,0,0.3);
      border:3px solid purple;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-5px);
    }

    /* PAMANGKIN (SLIGHTLY BIGGER) */
    .card.pamangkin {
      width:180px;
    }

    /* GALLERY (SLIGHTLY BIGGER) */
    .card.gallery {
      width:180px;
    }

    img {
      width:100%;
      height:130px;
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
      border:2px solid #ccc;
    }

    h4 {
      font-size:13px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
      background:#fff;
    }

    .title {
      border:3px solid red;
      display:inline-block;
      padding:5px 15px;
      border-radius:8px;
      background:white;
      box-shadow:0 3px 8px rgba(0,0,0,0.2);
    }

    input {width:90%; padding:6px; margin:5px;}
    button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

    .box {
      background:white;
      margin:20px auto;
      padding:15px;
      width:90%;
      max-width:400px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .comment {
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
      border-left:4px solid purple;
    }

    #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      z-index:1000;
    }

    #overlay {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    #zoomBox img {
      width:250px;
      height:auto;
    }

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<div id="loginBox" class="box">
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <!-- FAMILY (UNCHANGED STRUCTURE) -->
  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- PAMANGKIN -->
  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <!-- GALLERY -->
  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <!-- ZOOM -->
  <div id="zoomBox">
    <img id="zoomImg"><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <!-- COMMENTS -->
  <div class="box">
    <input id="comment">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentUser="", currentZoom="";

// LOGIN
if(localStorage.getItem("user")){
  loginBox.style.display="none"; app.style.display="block";
}
window.login=()=>{
  if(pass.value==="123"){
    currentUser=user.value;
    localStorage.setItem("user",user.value);
    loginBox.style.display="none"; app.style.display="block";
  }
};

// 🔥 ORIGINAL FAMILY STRUCTURE (BINALIK)
const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

// PAMANGKIN
const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin"],
  pamangkin2:["Ashley","Union","Jazmine","Apple","Bjoy"]
};

// GALLERY (5 LANG)
const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","","","",""]; }

// CREATE FUNCTION (UNCHANGED LOGIC)
function create(data,type=""){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      c.innerHTML+=`
      <div class="card ${type}">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

// APPLY (same structure)
create(layers);
create(pamangkin,"pamangkin");
create(gallery,"gallery");

// UPLOAD
window.upload=(e,id)=>{
  const r=new FileReader();
  r.onload=()=>setDoc(doc(db,"familyTree",id),{image:r.result});
  r.readAsDataURL(e.target.files[0]);
};

// ZOOM
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

// DELETE
window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
};

// CLOSE
window.closeAll=()=>{
  zoomBox.style.display="none";
  overlay.style.display="none";
};

// COMMENTS
window.addComment=()=>{
  if(!comment.value) return;
  addDoc(collection(db,"comments"),{
    name:currentUser,
    text:comment.value,
    time:Date.now()
  });
  comment.value="";
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    comments.innerHTML+=`<div class="comment"><b>${c.name}</b><br>${c.text}</div>`;
  });
});

</script>

</body>
</html>
