<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Secure</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .layer {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      width: 150px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border: 3px solid purple;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }

    h4 {
      font-size: 13px;
      border: 2px solid red;
      padding: 5px;
      border-radius: 6px;
      background: #fff0f5;
    }

    input {
      padding: 6px;
      margin: 5px;
    }

    button {
      padding: 6px 10px;
      background: purple;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .box {
      background: white;
      margin: 20px auto;
      padding: 15px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }

    .comment {
      background: #fff;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      text-align: left;
    }

  </style>
</head>

<body>

<header>
  👨‍👩‍👧‍👦 Lozada Family Secure
</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>🔐 Login</h3>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <!-- FAMILY TREE -->
  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- COMMENTS -->
  <div class="box">
    <h3>💬 Family Wall</h3>

    <input id="comment" placeholder="Write something..." style="width:70%">
    <button onclick="addComment()">Post</button>

    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8",
  storageBucket: "family-web-10cb8.appspot.com",
  messagingSenderId: "152048365178",
  appId: "1:152048365178:web:bd24e27f676b02b7d915c3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

// LOGIN FUNCTION
window.login = function(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "usee" && p === "123"){
    currentUser = u;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Wrong username or password");
  }
};

// FAMILY DATA
const layers = {
  layer1: ["DELIA LOZADA","JIMMY LOZADA"],
  layer2: ["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3: ["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

// CREATE FAMILY UI
Object.keys(layers).forEach(layerKey=>{
  const container = document.getElementById(layerKey);

  layers[layerKey].forEach((name,i)=>{
    const id = layerKey+"_"+i;

    container.innerHTML += `
      <div class="card">
        <img id="${id}">
        <h4>${name}</h4>
        <input type="file" onchange="uploadImage(event,'${id}')">
      </div>
    `;

    loadImage(id);
  });
});

// LOAD IMAGE
async function loadImage(id){
  const ref = doc(db,"familyTree",id);
  const snap = await getDoc(ref);

  if(snap.exists()){
    document.getElementById(id).src = snap.data().image;
  }
}

// UPLOAD IMAGE
window.uploadImage = function(e,id){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function(){
    const base64 = reader.result;

    await setDoc(doc(db,"familyTree",id),{
      image: base64
    });

    document.getElementById(id).src = base64;
  };

  reader.readAsDataURL(file);
};

// ADD COMMENT
window.addComment = async function(){
  const text = document.getElementById("comment").value;
  if(!text) return;

  await addDoc(collection(db,"comments"),{
    name: currentUser,
    text: text,
    time: Date.now()
  });

  document.getElementById("comment").value="";
};

// LOAD COMMENTS
const q = query(collection(db,"comments"),orderBy("time"));

onSnapshot(q,(snap)=>{
  const box = document.getElementById("comments");
  box.innerHTML="";

  snap.forEach(doc=>{
    const c = doc.data();

    box.innerHTML += `
      <div class="comment">
        <b>${c.name}</b><br>${c.text}
      </div>
    `;
  });
});

</script>

</body>
</html>
