<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lozada Family Pro</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
  transition: 0.3s;
}

.dark {
  background: #121212;
  color: white;
}

header {
  background: linear-gradient(45deg, red, purple);
  color: white;
  text-align: center;
  padding: 15px;
}

.family {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
}

.member {
  text-align: center;
  cursor: pointer;
}

.member img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid purple;
}

button {
  padding: 8px 12px;
  border: none;
  background: purple;
  color: white;
  border-radius: 5px;
  margin: 5px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  background: rgba(0,0,0,0.6);
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
}

.dark .modal-content {
  background: #222;
}

/* LOGIN */
#loginBox {
  text-align: center;
  margin-top: 100px;
}

.hidden {
  display: none;
}

/* COMMENTS */
.comment {
  background: white;
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
}

.dark .comment {
  background: #222;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
👨‍👩‍👧‍👦 Lozada Family Pro <br>
<button onclick="logout()">Logout</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</header>

<div class="family">

<script>
const members = [
"DELIA LOZADA","JIMMY LOZADA",
"CHERRY GRACE","CHEVY","JERBOY",
"JENADEL","JEMMEL","JIMDEL","JISA"
];

members.forEach(name=>{
  document.write(`
  <div class="member" onclick="openProfile('${name}')">
    <img src="${localStorage.getItem(name+'img') || 'https://via.placeholder.com/100'}">
    <p>${name}</p>
  </div>
  `)
});
</script>

</div>

<!-- COMMENTS -->
<div style="padding:20px;">
<h3>💬 Family Wall</h3>
<input id="commentInput" placeholder="Write something...">
<button onclick="postComment()">Post</button>

<div id="comments"></div>
</div>

</div>

<!-- PROFILE MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h3 id="name"></h3>

<input type="file" onchange="uploadPhoto(event)">
<input id="birthday" placeholder="Birthday">
<input id="address" placeholder="Address">
<input id="contact" placeholder="Contact">
<input id="email" placeholder="Email">

<button onclick="saveProfile()">SAVE</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

/* LOGIN SYSTEM */
if(localStorage.getItem("login")){
  showApp();
}

function login(){
  let u = user.value;
  let p = pass.value;

  if(p === "123"){
    localStorage.setItem("login", true);
    localStorage.setItem("username", u);
    showApp();
  } else alert("Wrong password");
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function showApp(){
  loginBox.style.display="none";
  app.classList.remove("hidden");
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* PROFILE */
let current="";

function openProfile(name){
  current = name;
  modal.style.display="block";
  document.getElementById("name").innerText=name;

  let data = JSON.parse(localStorage.getItem(name)) || {};

  birthday.value = data.birthday || "";
  address.value = data.address || "";
  contact.value = data.contact || "";
  email.value = data.email || "";
}

function saveProfile(){
  let data = {
    birthday: birthday.value,
    address: address.value,
    contact: contact.value,
    email: email.value
  };

  localStorage.setItem(current, JSON.stringify(data));
  alert("Saved!");
}

/* UPLOAD PHOTO */
function uploadPhoto(e){
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    localStorage.setItem(current+"img", reader.result);
    location.reload();
  }

  reader.readAsDataURL(file);
}

function closeModal(){
  modal.style.display="none";
}

/* COMMENTS */
function postComment(){
  let text = commentInput.value;
  let user = localStorage.getItem("username");

  if(!text) return;

  let comments = JSON.parse(localStorage.getItem("comments")) || [];

  comments.push({user, text, likes:0});

  localStorage.setItem("comments", JSON.stringify(comments));
  commentInput.value="";
  loadComments();
}

function loadComments(){
  let comments = JSON.parse(localStorage.getItem("comments")) || "";
  let html="";

  comments.forEach((c,i)=>{
    html += `
    <div class="comment">
      <b>${c.user}</b>: ${c.text}<br>
      ❤️ ${c.likes}
      <button onclick="like(${i})">Like</button>
      <button onclick="del(${i})">Delete</button>
    </div>
    `;
  });

  document.getElementById("comments").innerHTML=html;
}

function like(i){
  let c = JSON.parse(localStorage.getItem("comments"));
  c[i].likes++;
  localStorage.setItem("comments", JSON.stringify(c));
  loadComments();
}

function del(i){
  let c = JSON.parse(localStorage.getItem("comments"));
  c.splice(i,1);
  localStorage.setItem("comments", JSON.stringify(c));
  loadComments();
}

loadComments();

</script>

</body>
</html>
