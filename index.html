<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lozada Family Pro</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: linear-gradient(45deg, red, purple);
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

/* FAMILY GRID */
.family {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.member {
  text-align: center;
  margin: 10px;
  cursor: pointer;
}

.member img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid purple;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  text-align: center;
}

/* INPUTS */
input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

/* BUTTONS */
button {
  padding: 10px;
  border: none;
  background: purple;
  color: white;
  border-radius: 5px;
  margin: 5px;
}

/* LOGIN */
#loginBox {
  text-align: center;
  margin-top: 100px;
}

.hidden {
  display: none;
}

/* COMMENTS */
#comments {
  padding: 20px;
}

.comment-box {
  background: white;
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

<header>👨‍👩‍👧‍👦 Lozada Family Pro</header>

<div class="family">

  <div class="member" onclick="openProfile('DELIA LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>DELIA LOZADA</p>
  </div>

  <div class="member" onclick="openProfile('JIMMY LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>JIMMY LOZADA</p>
  </div>

  <div class="member" onclick="openProfile('CHERRY GRACE LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>CHERRY GRACE</p>
  </div>

  <div class="member" onclick="openProfile('CHEVY LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>CHEVY</p>
  </div>

  <div class="member" onclick="openProfile('JERBOY LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>JERBOY</p>
  </div>

  <div class="member" onclick="openProfile('JENADEL LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>JENADEL</p>
  </div>

  <div class="member" onclick="openProfile('JEMMEL LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>JEMMEL</p>
  </div>

  <div class="member" onclick="openProfile('JIMDEL LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>JIMDEL</p>
  </div>

  <div class="member" onclick="openProfile('JISA LOZADA')">
    <img src="https://via.placeholder.com/100">
    <p>JISA</p>
  </div>

</div>

<!-- COMMENTS -->
<div id="comments">
  <h3>💬 Family Wall</h3>
  <input id="commentInput" placeholder="Write something...">
  <button onclick="postComment()">Post</button>

  <div id="commentList"></div>
</div>

</div>

<!-- PROFILE MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h3 id="name"></h3>

    <input id="birthday" placeholder="Birthday">
    <input id="address" placeholder="Address">
    <input id="contact" placeholder="Contact">
    <input id="email" placeholder="Email">

    <button onclick="saveProfile()">SAVE / UPDATE</button>
    <button onclick="closeModal()">Close</button>

  </div>
</div>

<script>

/* AUTO LOGIN */
if(localStorage.getItem("login") === "true"){
  showApp();
}

/* LOGIN */
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "usee" && p === "123"){
    localStorage.setItem("login", "true");
    localStorage.setItem("username", u);
    showApp();
  } else {
    alert("Wrong login");
  }
}

function showApp(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
}

/* PROFILE */
let currentUser = "";

function openProfile(name){
  currentUser = name;
  document.getElementById("modal").style.display = "block";
  document.getElementById("name").innerText = name;

  let data = JSON.parse(localStorage.getItem(name)) || {};

  birthday.value = data.birthday || "";
  address.value = data.address || "";
  contact.value = data.contact || "";
  email.value = data.email || "";
}

function saveProfile(){
  let data = {
    birthday: birthday.value,
    address: address.value,
    contact: contact.value,
    email: email.value
  };

  localStorage.setItem(currentUser, JSON.stringify(data));
  alert("Saved!");
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* COMMENTS */
function postComment(){
  let text = document.getElementById("commentInput").value;
  let name = localStorage.getItem("username");

  if(text === "") return;

  let comments = JSON.parse(localStorage.getItem("comments")) || [];

  comments.push({name, text});

  localStorage.setItem("comments", JSON.stringify(comments));
  document.getElementById("commentInput").value = "";
  loadComments();
}

function loadComments(){
  let comments = JSON.parse(localStorage.getItem("comments")) || [];
  let html = "";

  comments.forEach(c => {
    html += `<div class="comment-box"><b>${c.name}</b>: ${c.text}</div>`;
  });

  document.getElementById("commentList").innerHTML = html;
}

loadComments();

</script>

</body>
</html>
