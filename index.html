<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}

    /* HEADER */
    header {
      background:linear-gradient(to right, red, purple);
      color:white;
      padding:20px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .header-title {
      font-size:28px;
      font-weight:bold;
      letter-spacing:2px;
    }

    .header-quote {
      font-size:14px;
      margin-top:5px;
      font-style:italic;
      opacity:0.9;
    }

    .layer {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      margin:20px 0;
    }

    .card {
      background:white;
      margin:10px;
      padding:10px;
      width: clamp(140px, 22vw, 180px);
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
      cursor:pointer;
    }

    img {
      width:100%;
      height: clamp(110px, 18vw, 150px);
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
    }

    h4 {
      font-size:13px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
    }

    .title {
      border:3px solid red;
      display:inline-block;
      padding:5px 15px;
      border-radius:8px;
      background:white;
    }

    input {width:90%; padding:6px; margin:5px;}
    button {padding:6px 10px; background:purple; color:white; border:none; border-radius:5px;}

    .box {
      background:white;
      margin:20px auto;
      padding:15px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    .comment {
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    /* 🔥 HOLOGRAM ZOOM BOX */
    #zoomBox {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 25px rgba(0,0,0,0.6);
      z-index:1000;
    }

    #zoomBox img {
      width:50vw;
      max-width:500px;
      height:auto;
      border-radius:12px;

      transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
      transition: transform 0.2s ease;

      box-shadow:
        0 0 20px rgba(255,0,255,0.6),
        0 0 40px rgba(0,255,255,0.4),
        0 0 60px rgba(255,0,255,0.3);
    }

    #overlay {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    .family-bg {
      background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      padding:20px 0;
      border-radius:12px;
      margin:10px;
    }

  </style>
</head>

<body>

<header>
  <div class="header-title">👨‍👩‍👧‍👦 LOZADA FAMILY ULTIMATE</div>
  <div class="header-quote">"Family is not an important thing, it's everything."</div>
</header>

<div id="loginBox" class="box">
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <div class="family-bg">
    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>
    <div class="layer" id="layer3"></div>
  </div>

  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>
  <div class="layer" id="gallery6"></div>
  <div class="layer" id="gallery7"></div>
  <div class="layer" id="gallery8"></div>
  <div class="layer" id="gallery9"></div>
  <div class="layer" id="gallery10"></div>

  <div id="overlay" onclick="closeAll()"></div>

  <div id="zoomBox">
    <img id="zoomImg"><br><br>
    <button onclick="deletePhoto()">Delete</button>
    <button onclick="closeAll()">Close</button>
  </div>

  <div class="box">
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const appFirebase = initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
});

const db = getFirestore(appFirebase);

let currentUser="", currentZoom="";

if(localStorage.getItem("user")){
  currentUser = localStorage.getItem("user");
  loginBox.style.display="none";
  app.style.display="block";
}

window.login=()=>{
  if(pass.value==="123"){
    currentUser=user.value;
    localStorage.setItem("user",user.value);
    loginBox.style.display="none";
    app.style.display="block";
  }
};

const layers={
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

const pamangkin={
  pamangkin1:["Cherry Jane","Lyka Che","Sean Ryan","Rye","Sherwin"],
  pamangkin2:["Ashley","Union","Jazmine","Apple","Bjoy"]
};

const gallery={};
for(let i=1;i<=10;i++){ gallery["gallery"+i]=["","","","",""]; }

function create(data){
  Object.keys(data).forEach(layerKey=>{
    const c=document.getElementById(layerKey);

    data[layerKey].forEach((name,i)=>{
      const id=layerKey+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4>${name||"Photo"}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

window.upload=(e,id)=>{
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=function(){
    const img=new Image();
    img.src=reader.result;

    img.onload=async function(){
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");

      const scale=300/img.width;
      canvas.width=300;
      canvas.height=img.height*scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      const compressed=canvas.toDataURL("image/jpeg",0.7);

      await setDoc(doc(db,"familyTree",id),{image:compressed});
    };
  };

  reader.readAsDataURL(file);
};

window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="block";
  overlay.style.display="block";
};

/* 🔥 3D HOLOGRAM EFFECT */
const zoomImage = document.getElementById("zoomImg");

zoomImage.addEventListener("mousemove", (e) => {
  const rect = zoomImage.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rotateX = -(y - rect.height/2) / 10;
  const rotateY = (x - rect.width/2) / 10;

  zoomImage.style.transform =
    `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

zoomImage.addEventListener("mouseleave", () => {
  zoomImage.style.transform =
    "perspective(1000px) rotateX(0deg) rotateY(0deg)";
});

window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
};

window.closeAll=()=>{
  zoomBox.style.display="none";
  overlay.style.display="none";
};

window.addComment=()=>{
  if(!comment.value) return;

  addDoc(collection(db,"comments"),{
    name:currentUser,
    text:comment.value,
    time:Date.now()
  });

  comment.value="";
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    comments.innerHTML+=`<div class="comment"><b>${c.name}</b><br>${c.text}</div>`;
  });
});

</script>

</body>
</html>
