<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}

    header {
      background:linear-gradient(to right, red, purple);
      color:white;
      padding:15px;
      font-size:22px;
    }

    .layer {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      margin:20px 0;
    }

    .card {
      background:white;
      margin:10px;
      padding:10px;
      width:150px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
      cursor:pointer;
    }

    img {
      width:100%;
      height:120px;
      object-fit:cover;
      border-radius:8px;
      background:#ddd;
    }

    h4 {
      font-size:13px;
      border:2px solid red;
      padding:5px;
      border-radius:6px;
    }

    input {
      width:90%;
      padding:6px;
      margin:5px;
    }

    button {
      padding:6px 10px;
      background:purple;
      color:white;
      border:none;
      border-radius:5px;
      margin:3px;
    }

    .box {
      background:white;
      margin:20px auto;
      padding:15px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    .comment {
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    /* 🔥 FLOATING MODAL */
    #profileBox {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:999;
    }

    .modalContent {
      background:white;
      margin:10% auto;
      padding:20px;
      width:90%;
      max-width:400px;
      border-radius:10px;
      text-align:center;
      animation:pop 0.3s ease;
    }

    @keyframes pop {
      from {transform:scale(0.7); opacity:0;}
      to {transform:scale(1); opacity:1;}
    }

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>🔐 Login</h3>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <!-- 💬 COMMENTS -->
  <div class="box">
    <h3>💬 Family Wall</h3>
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<!-- 🔥 FLOATING PROFILE -->
<div id="profileBox">
  <div class="modalContent">
    <h3 id="profileName"></h3>

    <input id="birthday" placeholder="Birthday"><br>
    <input id="address" placeholder="Address"><br>
    <input id="contact" placeholder="Contact"><br>
    <input id="email" placeholder="Email"><br>

    <button onclick="saveProfile()">SAVE / UPDATE</button>
    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";
let currentProfile = "";

// AUTO LOGIN
const savedUser = localStorage.getItem("user");
if(savedUser){
  currentUser = savedUser;
  loginSuccess();
}

// LOGIN
window.login = function(){
  const u = user.value.trim().toLowerCase();
  const p = pass.value.trim();

  if(u === "usee" && p === "123"){
    currentUser = u;
    localStorage.setItem("user", u);
    loginSuccess();
  } else {
    alert("Wrong login");
  }
};

function loginSuccess(){
  loginBox.style.display="none";
  app.style.display="block";
}

// FAMILY LAYERS
const layers = {
  layer1:["DELIA LOZADA","JIMMY LOZADA"],
  layer2:["CHERRY GRACE LOZADA","CHEVY LOZADA CORTEZ","JERBOY LOZADA"],
  layer3:["JENADEL LOZADA","JEMMEL LOZADA","JIMDEL LOZADA","JISA LOZADA"]
};

Object.keys(layers).forEach(layerKey=>{
  const container = document.getElementById(layerKey);

  layers[layerKey].forEach((name,i)=>{
    const id = layerKey+"_"+i;

    container.innerHTML += `
      <div class="card" onclick="openProfile('${name}','${id}')">
        <img id="${id}">
        <h4>${name}</h4>
        <input type="file" onclick="event.stopPropagation()" onchange="uploadImage(event,'${id}')">
      </div>
    `;

    loadImage(id);
  });
});

// LOAD IMAGE
async function loadImage(id){
  const snap = await getDoc(doc(db,"familyTree",id));
  if(snap.exists()){
    document.getElementById(id).src = snap.data().image;
  }
}

// UPLOAD IMAGE
window.uploadImage = function(e,id){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function(){
    await setDoc(doc(db,"familyTree",id),{
      image: reader.result
    });
    document.getElementById(id).src = reader.result;
  };

  reader.readAsDataURL(file);
};

// 🔥 OPEN FLOATING PROFILE
window.openProfile = async function(name,id){
  currentProfile = id;

  document.getElementById("profileBox").style.display="block";
  document.getElementById("profileName").innerText = name;

  const snap = await getDoc(doc(db,"profiles",id));
  if(snap.exists()){
    const d = snap.data();
    birthday.value = d.birthday||"";
    address.value = d.address||"";
    contact.value = d.contact||"";
    email.value = d.email||"";
  }
};

// SAVE PROFILE
window.saveProfile = async function(){
  await setDoc(doc(db,"profiles",currentProfile),{
    birthday:birthday.value,
    address:address.value,
    contact:contact.value,
    email:email.value
  });
  alert("Saved!");
};

// CLOSE
window.closeProfile = function(){
  profileBox.style.display="none";
};

// CLICK OUTSIDE CLOSE
window.onclick = function(e){
  if(e.target == profileBox){
    profileBox.style.display="none";
  }
};

// COMMENTS
window.addComment = async function(){
  const text = comment.value;
  if(!text) return;

  await addDoc(collection(db,"comments"),{
    name: currentUser,
    text:text,
    time:Date.now()
  });

  comment.value="";
};

const q = query(collection(db,"comments"),orderBy("time"));

onSnapshot(q,(snap)=>{
  comments.innerHTML="";
  snap.forEach(doc=>{
    const c = doc.data();
    comments.innerHTML += `
      <div class="comment">
        <b>${c.name}</b><br>${c.text}
      </div>
    `;
  });
});

</script>

</body>
</html>
