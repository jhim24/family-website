<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#f0f0f0; margin:0; text-align:center;}
    header {background:linear-gradient(to right, red, purple); color:white; padding:15px;}

    .layer {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}

    .card {
      background:white; margin:10px; padding:10px; width:150px;
      border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.2);
      border:3px solid purple;
    }

    img {width:100%; height:120px; border-radius:8px; background:#ddd;}

    .title {border:3px solid red; padding:5px 15px; border-radius:8px; display:inline-block;}

    /* 🔥 VIDEO FRAME */
    .video-box {
      width:95%;
      max-width:400px;
      margin:20px auto;
      background:black;
      padding:10px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    video {
      width:100%;
      border-radius:10px;
    }

  </style>
</head>

<body>

<header>👨‍👩‍👧‍👦 Lozada Family Ultimate</header>

<div id="loginBox">
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <div class="layer" id="layer1"></div>
  <div class="layer" id="layer2"></div>
  <div class="layer" id="layer3"></div>

  <h2 class="title">PAMANGKIN</h2>
  <div class="layer" id="pamangkin1"></div>
  <div class="layer" id="pamangkin2"></div>

  <!-- 🔥 VIDEO SLIDESHOW -->
  <h2 class="title">VIDEO GALLERY</h2>

  <div class="video-box">
    <video id="videoPlayer" controls autoplay loop></video>
  </div>

  <input type="file" accept="video/*" onchange="uploadVideo(event)">

  <!-- GALLERY -->
  <h2 class="title">GALLERY</h2>
  <div class="layer" id="gallery1"></div>
  <div class="layer" id="gallery2"></div>
  <div class="layer" id="gallery3"></div>
  <div class="layer" id="gallery4"></div>
  <div class="layer" id="gallery5"></div>
  <div class="layer" id="gallery6"></div>
  <div class="layer" id="gallery7"></div>
  <div class="layer" id="gallery8"></div>
  <div class="layer" id="gallery9"></div>
  <div class="layer" id="gallery10"></div>

  <!-- COMMENTS -->
  <div>
    <input id="comment">
    <button onclick="addComment()">Post</button>
    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

// LOGIN
if(localStorage.getItem("user")){
  loginBox.style.display="none";
  app.style.display="block";
}

window.login=()=>{
  if(pass.value==="123"){
    localStorage.setItem("user",user.value);
    loginBox.style.display="none";
    app.style.display="block";
  }
};

// VIDEO STORAGE
let videos=[];
let vIndex=0;

// REALTIME VIDEO LISTENER
onSnapshot(doc(db,"videos","main"),(snap)=>{
  if(snap.exists()){
    videos=snap.data().list || [];
  }
});

// AUTO PLAY LOOP
setInterval(()=>{
  if(videos.length>0){
    videoPlayer.src=videos[vIndex % videos.length];
    vIndex++;
  }
},5000);

// UPLOAD VIDEO
window.uploadVideo=(e)=>{
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=async()=>{
    videos.push(reader.result);

    await setDoc(doc(db,"videos","main"),{
      list:videos
    });
  };

  reader.readAsDataURL(file);
};

// COMMENTS
window.addComment=()=>{
  if(!comment.value) return;

  addDoc(collection(db,"comments"),{
    name:localStorage.getItem("user"),
    text:comment.value,
    time:Date.now()
  });

  comment.value="";
};

onSnapshot(query(collection(db,"comments"),orderBy("time")),(snap)=>{
  comments.innerHTML="";
  snap.forEach(d=>{
    let c=d.data();
    comments.innerHTML+=`<div><b>${c.name}</b><br>${c.text}</div>`;
  });
});

</script>

</body>
</html>
