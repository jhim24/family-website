<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .layer {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      width: 150px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border: 3px solid purple;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }

    h4 {
      font-size: 13px;
      border: 2px solid red;
      padding: 5px;
      border-radius: 6px;
      background: #fff0f5;
    }

    input {
      font-size: 10px;
      margin-top: 5px;
    }

    /* COMMENTS */
    .box {
      background: white;
      margin: 20px auto;
      padding: 15px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }

    button {
      padding: 6px 10px;
      background: purple;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }

    .comment {
      background: #fff;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      text-align: left;
    }

  </style>
</head>

<body>

<header>
  👨‍👩‍👧‍👦 Lozada Family
</header>

<!-- FAMILY TREE -->
<div class="layer" id="layer1"></div>
<div class="layer" id="layer2"></div>
<div class="layer" id="layer3"></div>

<!-- COMMENTS -->
<div class="box">
  <h3>💬 Family Wall</h3>

  <input id="username" placeholder="Your name"><br>
  <input id="comment" placeholder="Write something..." style="width:70%">
  <button onclick="addComment()">Post</button>

  <div id="comments"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8",
  storageBucket: "family-web-10cb8.appspot.com",
  messagingSenderId: "152048365178",
  appId: "1:152048365178:web:bd24e27f676b02b7d915c3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FAMILY LAYERS
const layers = {
  layer1: [
    "DELIA LOZADA",
    "JIMMY LOZADA"
  ],
  layer2: [
    "CHERRY GRACE LOZADA",
    "CHEVY LOZADA CORTEZ",
    "JERBOY LOZADA"
  ],
  layer3: [
    "JENADEL LOZADA",
    "JEMMEL LOZADA",
    "JIMDEL LOZADA",
    "JISA LOZADA"
  ]
};

// CREATE FAMILY
Object.keys(layers).forEach(layerKey=>{
  const container = document.getElementById(layerKey);

  layers[layerKey].forEach((name,i)=>{
    const id = layerKey+"_"+i;

    container.innerHTML += `
      <div class="card">
        <img id="${id}">
        <h4>${name}</h4>
        <input type="file" onchange="uploadImage(event,'${id}')">
      </div>
    `;

    loadImage(id);
  });
});

// LOAD IMAGE
async function loadImage(id){
  const ref = doc(db,"familyTree",id);
  const snap = await getDoc(ref);

  if(snap.exists()){
    document.getElementById(id).src = snap.data().image;
  }
}

// UPLOAD
window.uploadImage = function(e,id){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function(){
    const base64 = reader.result;

    await setDoc(doc(db,"familyTree",id),{
      image: base64
    });

    document.getElementById(id).src = base64;
  };

  reader.readAsDataURL(file);
};

// COMMENTS
window.addComment = async function(){
  const name = document.getElementById("username").value;
  const text = document.getElementById("comment").value;

  if(!name || !text) return;

  await addDoc(collection(db,"comments"),{
    name:name,
    text:text,
    time:Date.now()
  });

  document.getElementById("comment").value="";
};

const q = query(collection(db,"comments"),orderBy("time"));

onSnapshot(q,(snap)=>{
  const box = document.getElementById("comments");
  box.innerHTML="";

  snap.forEach(doc=>{
    const c = doc.data();

    box.innerHTML += `
      <div class="comment">
        <b>${c.name}</b><br>${c.text}
      </div>
    `;
  });
});

</script>

</body>
</html>
