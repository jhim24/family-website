<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Ultimate</title>

  <style>
    body {font-family: Arial; background:#111; margin:0; text-align:center; color:white;}

    header {
      background:linear-gradient(to right, red, purple);
      padding:25px;
      font-size:28px;
      font-weight:bold;
    }

    .quote {font-size:14px; opacity:0.8;}

    #loginBox {
      margin:80px auto;
      width:90%; max-width:300px;
      background:#1c1c1c;
      padding:20px;
      border-radius:12px;
      border:2px solid purple;
    }

    input {width:90%; padding:8px; margin:8px 0;}
    button {padding:8px 15px; background:purple; color:white; border:none; border-radius:6px; margin:5px;}

    /* VIDEO BG */
    .family-section {
      position:relative;
      padding:20px;
      overflow:hidden;
      background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    }

    .family-video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:1;
    }

    .content {position:relative; z-index:2;}

    .layer {
      display:grid;
      grid-template-columns:repeat(4,150px);
      gap:20px;
      justify-content:center;
      margin:20px;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:12px;
      border:2px solid purple;
    }

    img {width:100%; border-radius:8px; cursor:pointer;}

    h4 {border:2px solid red; padding:5px; border-radius:6px;}

    .pamangkin-section {background:#222; padding:20px;}
    .gallery-section {background:#333; padding:20px;}

    #zoomBox, #profileBox {
      display:none;
      position:fixed;
      z-index:2000;
    }

    #zoomBox {
      top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.95);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    #zoomBox img {width:90%;}

    #profileBox {
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:20px;
      border-radius:12px;
    }

  </style>
</head>

<body>

<header>
  🏡 LOZADA FAMILY ULTIMATE
  <div class="quote">Family is everything.</div>
</header>

<div id="loginBox">
  <h2>LOGIN</h2>
  <input id="user"><br>
  <input id="pass" type="password"><br>
  <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

  <!-- FAMILY -->
  <div class="family-section">
    <video id="bgVideo" class="family-video" autoplay muted loop>
      <source id="bgSource" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
      <button onclick="nextVideo()">Next Video</button>
      <div class="layer" id="layer1"></div>
      <div class="layer" id="layer2"></div>
      <div class="layer" id="layer3"></div>
    </div>
  </div>

  <!-- PAMANGKIN -->
  <div class="pamangkin-section">
    <h2>PAMANGKIN</h2>
    <div class="layer" id="pamangkin1"></div>
    <div class="layer" id="pamangkin2"></div>
  </div>

  <!-- GALLERY -->
  <div class="gallery-section">
    <h2>GALLERY</h2>
    <div class="layer" id="gallery1"></div>
    <div class="layer" id="gallery2"></div>
    <div class="layer" id="gallery3"></div>
    <div class="layer" id="gallery4"></div>
    <div class="layer" id="gallery5"></div>
  </div>

</div>

<!-- PROFILE -->
<div id="profileBox">
  <h3 id="profileName"></h3>
  <input id="birthday"><br>
  <input id="address"><br>
  <input id="contact"><br>
  <input id="email"><br>
  <button onclick="saveProfile()">Save</button>
  <button onclick="closeAll()">Close</button>
</div>

<!-- ZOOM -->
<div id="zoomBox">
  <img id="zoomImg">
  <button onclick="deletePhoto()">Delete</button>
  <button onclick="closeAll()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  projectId:"family-web-10cb8"
}));

let currentZoom="", currentProfile="";

// VIDEO
const videos=[
  "https://cdn.coverr.co/videos/coverr-modern-house-with-pool-1573/1080p.mp4",
  "https://cdn.coverr.co/videos/coverr-luxury-home-exterior-2605/1080p.mp4"
];

let vidIndex=0;

function loadVideo(){
  bgSource.src=videos[vidIndex];
  bgVideo.load();
}

window.nextVideo=()=>{
  vidIndex=(vidIndex+1)%videos.length;
  loadVideo();
};

setInterval(()=>{nextVideo()},10000);

// LOGIN
window.login=()=>{
  loginBox.style.display="none";
  app.style.display="block";
  loadVideo();
};

// DATA
const layers={
  layer1:["DELIA","JIMMY"],
  layer2:["CHERRY","CHEVY","JERBOY"],
  layer3:["JENADEL","JEMMEL","JIMDEL","JISA"]
};

const pamangkin={
  pamangkin1:["A","B","C","D"],
  pamangkin2:["E","F","G","H"]
};

const gallery={};
for(let i=1;i<=5;i++){ gallery["gallery"+i]=["","","",""]; }

// CREATE
function create(data){
  Object.keys(data).forEach(k=>{
    const c=document.getElementById(k);

    data[k].forEach((name,i)=>{
      const id=k+"_"+i;

      c.innerHTML+=`
      <div class="card">
        <img id="${id}" onclick="zoom('${id}')">
        <h4 onclick="openProfile('${id}','${name}')">${name}</h4>
        <input type="file" onchange="upload(event,'${id}')">
      </div>`;

      onSnapshot(doc(db,"familyTree",id),(snap)=>{
        if(snap.exists()){
          document.getElementById(id).src=snap.data().image;
        }
      });
    });
  });
}

create(layers);
create(pamangkin);
create(gallery);

// UPLOAD
window.upload=(e,id)=>{
  const r=new FileReader();
  r.onload=()=>setDoc(doc(db,"familyTree",id),{image:r.result});
  r.readAsDataURL(e.target.files[0]);
};

// ZOOM
window.zoom=(id)=>{
  currentZoom=id;
  zoomImg.src=document.getElementById(id).src;
  zoomBox.style.display="flex";
};

// DELETE
window.deletePhoto=async()=>{
  await deleteDoc(doc(db,"familyTree",currentZoom));
};

// PROFILE
window.openProfile=async(id,name)=>{
  currentProfile=id;
  profileName.innerText=name;
  profileBox.style.display="block";

  const snap = await getDoc(doc(db,"profiles",id));
  if(snap.exists()){
    const d=snap.data();
    birthday.value=d.birthday||"";
    address.value=d.address||"";
    contact.value=d.contact||"";
    email.value=d.email||"";
  }
};

window.saveProfile=()=>{
  setDoc(doc(db,"profiles",currentProfile),{
    birthday:birthday.value,
    address:address.value,
    contact:contact.value,
    email:email.value
  });
};

window.closeAll=()=>{
  zoomBox.style.display="none";
  profileBox.style.display="none";
};

</script>

</body>
</html>
