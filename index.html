<!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      text-align: center;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 15px;
      font-size: 22px;
    }

    .box {
      margin: 20px auto;
      padding: 15px;
      width: 90%;
      max-width: 400px;
      background: white;
      border-radius: 10px;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 80%;
    }

    button {
      padding: 8px 12px;
      background: purple;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 3px;
    }

    .comment {
      background: #fff;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      text-align: left;
    }

  </style>
</head>

<body>

<header>
  👨‍👩‍👧‍👦 Lozada Family Pro
</header>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Login</h3>
  <input id="username" placeholder="Enter your name">
  <br>
  <button onclick="login()">Enter</button>
</div>

<!-- MAIN -->
<div id="app" style="display:none;">

  <!-- COMMENT -->
  <div class="box">
    <h3>💬 Family Wall</h3>
    <input id="comment" placeholder="Write something...">
    <button onclick="addComment()">Post</button>

    <div id="comments"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8",
  storageBucket: "family-web-10cb8.appspot.com",
  messagingSenderId: "152048365178",
  appId: "1:152048365178:web:bd24e27f676b02b7d915c3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = "";

// LOGIN
window.login = function(){
  user = document.getElementById("username").value;
  if(!user) return alert("Enter name");

  localStorage.setItem("user", user);

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
};

// AUTO LOGIN
const savedUser = localStorage.getItem("user");
if(savedUser){
  user = savedUser;
  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
}

// ADD COMMENT
window.addComment = async function(){
  const text = document.getElementById("comment").value;
  if(!text) return;

  await addDoc(collection(db,"comments"),{
    user:user,
    text:text,
    likes:0,
    time:Date.now()
  });

  document.getElementById("comment").value="";
};

// LOAD COMMENTS
const q = query(collection(db,"comments"),orderBy("time"));

onSnapshot(q,(snap)=>{
  const box = document.getElementById("comments");
  box.innerHTML="";

  snap.forEach(docSnap=>{
    const c = docSnap.data();
    const id = docSnap.id;

    box.innerHTML += `
      <div class="comment">
        <b>${c.user}</b><br>${c.text}<br>
        👍 ${c.likes}
        <br>
        <button onclick="likePost('${id}',${c.likes})">Like</button>
        ${c.user === user ? `<button onclick="deletePost('${id}')">Delete</button>` : ""}
      </div>
    `;
  });
});

// LIKE
window.likePost = async function(id,likes){
  await updateDoc(doc(db,"comments",id),{
    likes: likes + 1
  });
};

// DELETE
window.deletePost = async function(id){
  await deleteDoc(doc(db,"comments",id));
};

</script>

</body>
</html>
