    <!DOCTYPE html>
<html>
<head>
  <title>Lozada Family Cloud</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    header {
      background: linear-gradient(to right, red, purple);
      color: white;
      padding: 20px;
    }

    .card {
      background: white;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 260px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    input {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>👨‍👩‍👧‍👦 Lozada Family Cloud</h1>
</header>

<div class="card">
  <img id="preview">
  <input type="file" onchange="uploadImage(event)">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

// 🔥 YOUR CONFIG (OK NA ITO)
const firebaseConfig = {
  apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
  authDomain: "family-web-10cb8.firebaseapp.com",
  projectId: "family-web-10cb8",
  storageBucket: "family-web-10cb8.appspot.com", // FIXED ito
  messagingSenderId: "152048365178",
  appId: "1:152048365178:web:bd24e27f676b02b7d915c3",
  measurementId: "G-LJG0JXDXTS"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

// 🔥 UPLOAD FUNCTION
window.uploadImage = async function(event) {
  const file = event.target.files[0];

  if (!file) return;

  const storageRef = ref(storage, "family/photo.jpg");

  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  document.getElementById("preview").src = url;

  alert("✅ Uploaded successfully!");
};

</script>

</body>
</html>
